.toggle-row button:last-child{border-radius:0 8px 8px 0}
.toggle-row button:not(:first-child):not(:last-child){border-radius:0}

.heatmap-table{width:100%;border-collapse:separate;border-spacing:3px;font-size:12px}
.heatmap-table th{padding:8px 10px;font-weight:600;font-size:11px;color:#666;text-align:center;background:transparent;text-transform:uppercase;letter-spacing:.4px;border:none}
.heatmap-table th:first-child{text-align:left}
.heatmap-table td{padding:9px 10px;text-align:center;font-weight:600;border-radius:4px;color:#2a2a2a}
.heatmap-table td:first-child{text-align:left;background:transparent;color:#333;font-weight:600;padding-left:0}
.heatmap-table td.none{background:#f5f5f5;color:#bbb;font-weight:400}
.insights{background:#f8f8f8;border:1px solid #e0e0e0;border-radius:14px;padding:22px 24px;margin-top:16px}
.insights-title{font-size:14px;font-weight:600;color:#555;margin-bottom:14px}
.insight-item{font-size:13px;line-height:1.7;color:#444;margin-bottom:8px;padding-left:18px;position:relative}
.insight-item::before{content:'';position:absolute;left:0;top:8px;width:8px;height:8px;border-radius:50%}
.insight-item.positive::before{background:#0F6E56}
.insight-item.negative::before{background:#E24B4A}
.insight-item.neutral::before{background:#6B4DAA}

function destroyCharts(){charts.forEach(c=>{try{c.destroy()}catch(e){}});charts=[];}

function heatColor(val, isGood) {
  if(val===null||isNaN(val)) return {bg:'#f5f5f5',text:'#ccc'};
  if(val===0) return {bg:'#f0f0f0',text:'#aaa'};
  const t = Math.max(0,Math.min(1,Math.abs(val)/30));
  if((isGood&&val>0)||(!isGood&&val<0)) {
    const r=Math.round(232+(29-232)*t),g=Math.round(245+(158-245)*t),b=Math.round(232+(117-232)*t);
    return{bg:`rgb(${r},${g},${b})`,text:t>0.5?'#fff':'#0a3d2d'};
  } else {
    const r=Math.round(255+(200-255)*t),g=Math.round(245+(60-245)*t),b=Math.round(245+(60-245)*t);
    return{bg:`rgb(${r},${g},${b})`,text:t>0.5?'#fff':'#7a1b1b'};
  }
}

    ${curTab==='grade'?`<button onclick="showGradeView=!showGradeView;render()" style="padding:8px 14px;font-size:11px;font-weight:600;border:1px dashed #aaa;border-radius:8px;background:#fafafa;color:#888;cursor:pointer;font-family:inherit">${showGradeView?'Hide Grade View ▲':'Show Grade View ▾'}</button>`:''}

  h += '<div class="toggle-row">';

    h+=`<button onclick="curSubject='${s}';render()" style="${a?'background:#6B4DAA;color:#fff;font-weight:600;border-color:#6B4DAA;':''}font-family:inherit">${s}</button>`;
  });
  h += '</div>';

  if(curTab==='grade') {
    // Year + Grade selectors
    h += '<div class="toggle-row">';
    ['2024-25','2025-26'].forEach(y=>{
      const a=y===curYear;
      h+=`<button onclick="curYear='${y}';render()" style="${a?'background:#333;color:#fff;font-weight:600;border-color:#333;':''}font-family:inherit">${y}</button>`;
    });
    h += '</div><div class="toggle-row">';
    allGrades.forEach((g,i)=>{
      const a=g===curGrade;
      const first=i===0,last=i===allGrades.length-1;
      h+=`<button onclick="curGrade='${g}';render()" style="${a?'background:#185FA5;color:#fff;font-weight:600;border-color:#185FA5;':''}font-family:inherit;${first?'border-radius:8px 0 0 8px':last?'border-radius:0 8px 8px 0':'border-radius:0'};${i>0?'border-left:none':''};padding:9px 14px;font-size:12px">${g.replace('Grade ','G')}</button>`;
    });
    h += '</div>';
  }

  ctrl.innerHTML = h;

  if(curTab === 'yoy') { renderYoY(content); return; }
  if(curTab === 'grade' && showGradeView) { renderGradeView(content); return; }

    content.innerHTML = `<div style="text-align:center;padding:60px;color:#aaa;font-size:14px">Click <strong style="color:#555">"Show Grade View ▾"</strong> to enable this view</div>`;

      <div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:10px">`;

    gradesWithData.forEach(g => {
      const e24 = d24?.[g], e25 = d25?.[g];
      // 4 bars: SOY24, SOY25, EOY24, EOY25 (null if missing)
      const labels = ['24-25','25-26','24-25','25-26'];
      const l1D=[e24?.SOY?.[0]??null, e25?.SOY?.[0]??null, e24?.EOY?.[0]??null, e25?.EOY?.[0]??null];
      const l2D=[e24?.SOY?.[1]??null, e25?.SOY?.[1]??null, e24?.EOY?.[1]??null, e25?.EOY?.[1]??null];
      const l3D=[e24?.SOY?.[2]??null, e25?.SOY?.[2]??null, e24?.EOY?.[2]??null, e25?.EOY?.[2]??null];
      const l4D=[e24?.SOY?.[3]??null, e25?.SOY?.[3]??null, e24?.EOY?.[3]??null, e25?.EOY?.[3]??null];
      const drop24 = e24?.SOY && e24?.EOY ? e24.SOY[0]-e24.EOY[0] : null;
      const drop25 = e25?.SOY && e25?.EOY ? e25.SOY[0]-e25.EOY[0] : null;

      // Tile summary
      const l1c24 = drop24>0?'#0D6B50':drop24<0?'#C0392B':'#888';
      const l1c25 = drop25>0?'#0D6B50':drop25<0?'#C0392B':'#888';
      const stripH = (drop24!==null||drop25!==null) ? `<div style="display:flex;justify-content:space-around;padding:7px 6px;background:#f8f8f8;border-top:1px solid #e8e8e8;font-size:10px;font-weight:700;gap:2px">
        ${drop24!==null?`<span style="color:${l1c24}">24: ${drop24>0?'▼'+drop24:drop24<0?'▲'+Math.abs(drop24):'-'}pp</span>`:'<span style="color:#ccc">24: —</span>'}
        <span style="color:#ddd">|</span>
        ${drop25!==null?`<span style="color:${l1c25}">25: ${drop25>0?'▼'+drop25:drop25<0?'▲'+Math.abs(drop25):'-'}pp</span>`:'<span style="color:#ccc">25: —</span>'}
      </div>` : '';

      html += `<div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)">
        <div style="font-size:11px;font-weight:700;color:#555;text-align:center;padding:9px 8px 5px">${g}</div>
        <div style="padding:0 8px;position:relative;width:calc(100%-16px);height:200px"><canvas id="yoyCanvas${ci}"></canvas></div>
        ${stripH}
      </div>`;
      ci++;
    });

    html += '</div></div>';
  });

  content.innerHTML = html;

  // Render charts
  let idx = 0;
  partners.forEach(p => {
    const pData = PARTNER_DATA[p][curSubject];
    const d24 = pData?.['2024-25'], d25 = pData?.['2025-26'];
    if(!d24 && !d25) return;
    const gradesWithData = allGrades.filter(g => (d24?.[g]?.SOY||d24?.[g]?.EOY)||(d25?.[g]?.SOY||d25?.[g]?.EOY));

    gradesWithData.forEach(g => {
      const e24 = d24?.[g], e25 = d25?.[g];
      const l1D=[e24?.SOY?.[0]??null,e25?.SOY?.[0]??null,e24?.EOY?.[0]??null,e25?.EOY?.[0]??null];
      const l2D=[e24?.SOY?.[1]??null,e25?.SOY?.[1]??null,e24?.EOY?.[1]??null,e25?.EOY?.[1]??null];
      const l3D=[e24?.SOY?.[2]??null,e25?.SOY?.[2]??null,e24?.EOY?.[2]??null,e25?.EOY?.[2]??null];
      const l4D=[e24?.SOY?.[3]??null,e25?.SOY?.[3]??null,e24?.EOY?.[3]??null,e25?.EOY?.[3]??null];
      const drop24=e24?.SOY&&e24?.EOY?e24.SOY[0]-e24.EOY[0]:null;
      const drop25=e25?.SOY&&e25?.EOY?e25.SOY[0]-e25.EOY[0]:null;

      const plugin={id:'yp'+idx,
        beforeDatasetsDraw(chart){
          const ctx=chart.ctx,meta=chart.getDatasetMeta(0),ca=chart.chartArea;
          const bars=meta.data.filter(b=>b);if(bars.length<2)return;ctx.save();
          // SOY bucket (bars 0-1)
          const hasSoy0=l1D[0]!==null,hasSoy1=l1D[1]!==null;
          const hasEoy0=l1D[2]!==null,hasEoy1=l1D[3]!==null;
          if(hasSoy0||hasSoy1){
            const b0=meta.data[0],b1=meta.data[1];
            const sl=Math.min(b0?.x??Infinity,b1?.x??Infinity)-8,sr=Math.max(b0?.x??-Infinity,b1?.x??-Infinity)+8;
            if(sl<sr){ctx.fillStyle='rgba(24,95,165,0.08)';ctx.strokeStyle='rgba(24,95,165,0.18)';ctx.lineWidth=1;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(sl,ca.top-20,sr-sl,ca.bottom-ca.top+24,5);else ctx.rect(sl,ca.top-20,sr-sl,ca.bottom-ca.top+24);ctx.fill();ctx.stroke();}
          }
          if(hasEoy0||hasEoy1){
            const b2=meta.data[2],b3=meta.data[3];
            const el=Math.min(b2?.x??Infinity,b3?.x??Infinity)-8,er=Math.max(b2?.x??-Infinity,b3?.x??-Infinity)+8;
            if(el<er){ctx.fillStyle='rgba(15,110,86,0.08)';ctx.strokeStyle='rgba(15,110,86,0.18)';ctx.lineWidth=1;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(el,ca.top-20,er-el,ca.bottom-ca.top+24,5);else ctx.rect(el,ca.top-20,er-el,ca.bottom-ca.top+24);ctx.fill();ctx.stroke();}
          }
          ctx.restore();
        },
        afterDatasetsDraw(chart){
          const ctx=chart.ctx,meta=chart.getDatasetMeta(0),last=chart.getDatasetMeta(3),ca=chart.chartArea;
          ctx.save();ctx.textAlign='center';ctx.textBaseline='bottom';ctx.font='600 8px -apple-system,sans-serif';
          if(l1D[0]!==null||l1D[1]!==null){const cx=(meta.data[0].x+meta.data[1].x)/2;ctx.fillStyle='#185FA5';ctx.fillText('SOY',cx,ca.top-7);}
          if(l1D[2]!==null||l1D[3]!==null){const cx=(meta.data[2].x+meta.data[3].x)/2;ctx.fillStyle='#0F6E56';ctx.fillText('EOY',cx,ca.top-7);}
          ctx.font='bold 8px -apple-system,sans-serif';ctx.fillStyle=deltaC;
          if(drop24!==null){ctx.fillText(drop24>0?'▼'+drop24:drop24<0?'▲'+Math.abs(drop24):'-',meta.data[2].x,last.data[2].y-2);}
          if(drop25!==null){ctx.fillText(drop25>0?'▼'+drop25:drop25<0?'▲'+Math.abs(drop25):'-',meta.data[3].x,last.data[3].y-2);}
          ctx.restore();
        }
      };

      const cv=document.getElementById('yoyCanvas'+idx);
      if(!cv){idx++;return;}
      const c=new Chart(cv,{type:'bar',data:{labels:['24-25','25-26','24-25','25-26'],datasets:[
        {label:'L1',data:l1D,backgroundColor:segC[0],borderWidth:0,stack:'a',barPercentage:0.85,categoryPercentage:0.65},
        {label:'L2',data:l2D,backgroundColor:segC[1],borderWidth:0,stack:'a',barPercentage:0.85,categoryPercentage:0.65},
        {label:'L3',data:l3D,backgroundColor:segC[2],borderWidth:0,stack:'a',barPercentage:0.85,categoryPercentage:0.65},
        {label:'L4',data:l4D,backgroundColor:segC[3],borderWidth:0,stack:'a',barPercentage:0.85,categoryPercentage:0.65}
      ]},plugins:[plugin],options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:28,left:2,right:2,bottom:2}},
        plugins:{legend:{display:false},
          tooltip:{callbacks:{title:ctx=>`${p} · ${g} · ${['SOY 24-25','SOY 25-26','EOY 24-25','EOY 25-26'][ctx[0].dataIndex]}`,label:ctx=>ctx.dataset.label+': '+ctx.raw+'%'}},
          datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>=16,color:ctx=>ctx.datasetIndex===1?'#5a3e00':'#fff',font:{size:9,weight:'700'},formatter:v=>v+'%'}},
        scales:{
          x:{stacked:true,ticks:{color:'#555',font:{size:9,weight:'600'},autoSkip:false,maxRotation:0},grid:{display:false}},
          y:{stacked:true,max:110,ticks:{color:'#999',callback:v=>v<=100?v+'%':'',font:{size:9},stepSize:50},grid:{color:'rgba(0,0,0,0.05)'}}
        }}});
      charts.push(c);
      idx++;
    });
  });
}

function renderGradeView(content) {
  // Get partners with data for this combo
  const activePartners = partners.filter(p => {
    const d = PARTNER_DATA[p][curSubject]?.[curYear]?.[curGrade];
    return d && (d.SOY || d.EOY);
  });

  if(activePartners.length === 0) {
    content.innerHTML = `<div style="text-align:center;padding:60px;color:#aaa;font-size:14px">No data available for ${curSubject} · ${curYear} · ${curGrade}</div>`;
    return;
  }

  // Legend
  let cH = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
    <div style="display:flex;gap:14px;flex-wrap:wrap">
      ${['L1','L2','L3','L4'].map((l,i)=>`<span style="display:flex;align-items:center;gap:5px;font-size:12px;color:#888"><span style="width:12px;height:12px;border-radius:3px;background:${segC[i]};display:inline-block"></span>${l}</span>`).join('')}
      <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:#888"><span style="width:20px;height:3px;background:#185FA5;display:inline-block;border-radius:2px"></span>SOY</span>
      <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:#888"><span style="width:20px;height:3px;background:#0F6E56;display:inline-block;border-radius:2px"></span>EOY</span>
    </div>
    <div style="font-size:11px;color:#aaa">${activePartners.length} partners have data for ${curSubject} · ${curYear} · ${curGrade}</div>
  </div>`;

  // Grid of partner charts
  const cols = Math.min(activePartners.length, 3);
  cH += `<div style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:16px;margin-bottom:24px">`;

  activePartners.forEach((p, pi) => {
    const d = PARTNER_DATA[p][curSubject][curYear][curGrade];
    const hasSoy = !!d.SOY, hasEoy = !!d.EOY;
    const drop = hasSoy && hasEoy ? d.SOY[0] - d.EOY[0] : null;
    const l34gain = hasSoy && hasEoy ? (d.EOY[2]+d.EOY[3])-(d.SOY[2]+d.SOY[3]) : null;
    const dropCol = drop===null?'#888':drop>0?'#0D6B50':drop<0?'#C0392B':'#888';
    const gainCol = l34gain===null?'#888':l34gain>0?'#0D6B50':l34gain<0?'#C0392B':'#888';

    // Tile summary strip
    let stripH = '';
    if(drop !== null) {
      stripH = `<div style="display:flex;justify-content:space-around;padding:8px 6px;background:#f8f8f8;border-top:1px solid #e8e8e8;font-size:11px;font-weight:700;gap:4px">
        <span style="color:${dropCol}">L1 ${drop>0?'▼'+drop:drop<0?'▲'+Math.abs(drop):'-'}pp</span>
        <span style="color:#ddd">|</span>
        <span style="color:${gainCol}">L3+4 ${l34gain>0?'▲'+l34gain:l34gain<0?'▼'+Math.abs(l34gain):'-'}pp</span>
      </div>`;
    }

    cH += `<div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)">
      <div style="padding:10px 12px 6px;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:13px;font-weight:800;color:${PARTNER_DATA[p].color}">${p}</div>
        ${!hasSoy?'<div style="font-size:9px;background:#FFF3E0;color:#E67E22;padding:2px 6px;border-radius:4px;font-weight:600">EOY only</div>':''}
      </div>
      <div style="padding:0 10px;position:relative;width:calc(100% - 20px);height:240px"><canvas id="pChart${pi}"></canvas></div>
      ${stripH}
    </div>`;
  });
  cH += '</div>';

  // Heatmap — L1 change across all partners × grades
  ['L1 Change','L3+L4 Gain'].forEach((metric, mi) => {
    cH += `<div class="heatmap-wrap" style="margin-bottom:16px">
      <div class="heatmap-title">${metric} — SOY→EOY · ${curSubject} · ${curYear} &nbsp;·&nbsp; <span style="font-weight:400;color:#aaa">green = better · red = worse</span></div>
      <table class="heatmap-table"><thead><tr><th>Partner</th>`;
    allGrades.forEach(g => { cH += `<th>${g.replace('Grade ','G')}</th>`; });
    cH += `</tr></thead><tbody>`;

    partners.forEach(p => {
      cH += `<tr><td style="color:${PARTNER_DATA[p].color};font-weight:700">${p}</td>`;
      allGrades.forEach(g => {
        const d = PARTNER_DATA[p][curSubject]?.[curYear]?.[g];
        if(!d||!d.SOY||!d.EOY){cH+=`<td class="none">—</td>`;return;}
        const val = mi===0 ? d.SOY[0]-d.EOY[0] : (d.EOY[2]+d.EOY[3])-(d.SOY[2]+d.SOY[3]);
        const c = heatColor(val, true);
        const arrow = val>0?'▲':val<0?'▼':'';
        cH+=`<td style="background:${c.bg};color:${c.text};cursor:default" title="${p} ${g}: ${metric} = ${val>0?'+':''}${val}pp">${arrow}${Math.abs(val)}pp</td>`;
      });
      cH += '</tr>';
    });
    cH += '</tbody></table></div>';
  });

  content.innerHTML = cH;

  // Render charts
  activePartners.forEach((p, pi) => {
    const d = PARTNER_DATA[p][curSubject][curYear][curGrade];
    const hasSoy = !!d.SOY, hasEoy = !!d.EOY;
    const drop = hasSoy && hasEoy ? d.SOY[0] - d.EOY[0] : null;

    const labels = hasSoy && hasEoy ? ['SOY','EOY'] : hasEoy ? ['EOY'] : ['SOY'];
    const l1D = hasSoy && hasEoy ? [d.SOY[0],d.EOY[0]] : hasEoy ? [d.EOY[0]] : [d.SOY[0]];
    const l2D = hasSoy && hasEoy ? [d.SOY[1],d.EOY[1]] : hasEoy ? [d.EOY[1]] : [d.SOY[1]];
    const l3D = hasSoy && hasEoy ? [d.SOY[2],d.EOY[2]] : hasEoy ? [d.EOY[2]] : [d.SOY[2]];
    const l4D = hasSoy && hasEoy ? [d.SOY[3],d.EOY[3]] : hasEoy ? [d.EOY[3]] : [d.SOY[3]];

    const plugin = {id:'pp'+pi,
      afterDatasetsDraw(chart){
        if(!hasSoy||!hasEoy)return;
        const ctx=chart.ctx,meta=chart.getDatasetMeta(0),last=chart.getDatasetMeta(3),ca=chart.chartArea;
        if(!meta.data.length)return;ctx.save();
        const b0=meta.data[0],b1=meta.data[1];
        ctx.fillStyle='rgba(24,95,165,0.08)';ctx.strokeStyle='rgba(24,95,165,0.20)';ctx.lineWidth=1;
        ctx.beginPath();if(ctx.roundRect)ctx.roundRect(b0.x-b0.width/2-5,ca.top-20,b0.width+10,ca.bottom-ca.top+24,5);else ctx.rect(b0.x-b0.width/2-5,ca.top-20,b0.width+10,ca.bottom-ca.top+24);ctx.fill();ctx.stroke();
        ctx.fillStyle='rgba(15,110,86,0.08)';ctx.strokeStyle='rgba(15,110,86,0.20)';
        ctx.beginPath();if(ctx.roundRect)ctx.roundRect(b1.x-b1.width/2-5,ca.top-20,b1.width+10,ca.bottom-ca.top+24,5);else ctx.rect(b1.x-b1.width/2-5,ca.top-20,b1.width+10,ca.bottom-ca.top+24);ctx.fill();ctx.stroke();
        ctx.textAlign='center';ctx.textBaseline='bottom';ctx.font='600 9px -apple-system,sans-serif';
        ctx.fillStyle='#185FA5';ctx.fillText('SOY',b0.x,ca.top-7);
        ctx.fillStyle='#0F6E56';ctx.fillText('EOY',b1.x,ca.top-7);
        if(drop!==null){ctx.font='bold 9px -apple-system,sans-serif';ctx.fillStyle=deltaC;ctx.fillText(drop>0?'▼'+drop:drop<0?'▲'+Math.abs(drop):'-',b1.x,last.data[1].y-3);}
        ctx.restore();
      }
    };

    const cv = document.getElementById('pChart'+pi);
    if(!cv) return;
    const c = new Chart(cv,{type:'bar',data:{labels,datasets:[
      {label:'L1',data:l1D,backgroundColor:segC[0],borderWidth:0,stack:'a',barPercentage:0.8,categoryPercentage:0.6},
      {label:'L2',data:l2D,backgroundColor:segC[1],borderWidth:0,stack:'a',barPercentage:0.8,categoryPercentage:0.6},
      {label:'L3',data:l3D,backgroundColor:segC[2],borderWidth:0,stack:'a',barPercentage:0.8,categoryPercentage:0.6},
      {label:'L4',data:l4D,backgroundColor:segC[3],borderWidth:0,stack:'a',barPercentage:0.8,categoryPercentage:0.6}
    ]},plugins:[plugin],options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:28,left:4,right:4,bottom:4}},
      plugins:{legend:{display:false},
        tooltip:{callbacks:{title:ctx=>`${p} · ${ctx[0].label} · ${curGrade}`,label:ctx=>ctx.dataset.label+': '+ctx.raw+'%'}},
        datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>=14,color:ctx=>ctx.datasetIndex===1?'#5a3e00':'#fff',font:{size:9,weight:'700'},formatter:v=>v+'%'}},
      scales:{
        x:{stacked:true,ticks:{color:'#333',font:{size:11,weight:'700'}},grid:{display:false}},
        y:{stacked:true,max:110,ticks:{color:'#999',callback:v=>v<=100?v+'%':'',font:{size:10},stepSize:50},grid:{color:'rgba(0,0,0,0.05)'}}
      }}});
    charts.push(c);
  });
}

render();
</script>
</body>
</html>
