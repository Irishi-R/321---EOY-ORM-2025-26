// Heatmap helpers
// Color scales: returns bg color and text color based on value and scale type
function heatRedScale(val, max) {
  // Higher = worse (redder). max is the reference max.
  if (val === null || val === undefined) return { bg: '#f5f5f5', text: '#bbb' };
  const t = Math.max(0, Math.min(1, val / max));
  // blend: light red #FCEBEB (t=0) to strong red #E24B4A (t=1)
  const r = Math.round(252 + (226 - 252) * t);
  const g = Math.round(235 + (75 - 235) * t);
  const b = Math.round(235 + (74 - 235) * t);
  const text = t > 0.55 ? '#fff' : '#7a1b1b';
  return { bg: 'rgb('+r+','+g+','+b+')', text };
}

function heatPurpleScale(val, max) {
  // Higher = better (more purple). For positive values only.
  if (val === null || val === undefined) return { bg: '#f5f5f5', text: '#bbb' };
  if (val <= 0) {
    // Negative values get a muted red instead
    const t = Math.min(1, Math.abs(val) / 20);
    const r = Math.round(252 + (226 - 252) * t);
    const g = Math.round(235 + (75 - 235) * t);
    const b = Math.round(235 + (74 - 235) * t);
    return { bg: 'rgb('+r+','+g+','+b+')', text: t > 0.55 ? '#fff' : '#7a1b1b' };
  }
  const t = Math.max(0, Math.min(1, val / max));
  // blend: light purple #EEEDFE (t=0) to strong purple #6B4DAA (t=1)
  const r = Math.round(238 + (107 - 238) * t);
  const g = Math.round(237 + (77 - 237) * t);
  const b = Math.round(254 + (170 - 254) * t);
  const text = t > 0.5 ? '#fff' : '#3c2870';
  return { bg: 'rgb('+r+','+g+','+b+')', text };
}

function heatGreenScale(val, max) {
  if (val === null || val === undefined) return { bg: '#f5f5f5', text: '#bbb' };
  if (val <= 0) {
    const t = Math.min(1, Math.abs(val) / 20);
    const r = Math.round(252 + (226 - 252) * t);
    const g = Math.round(235 + (75 - 235) * t);
    const b = Math.round(235 + (74 - 235) * t);
    return { bg: 'rgb('+r+','+g+','+b+')', text: t > 0.55 ? '#fff' : '#7a1b1b' };
  }
  const t = Math.max(0, Math.min(1, val / max));
  const r = Math.round(225 + (15 - 225) * t);
  const g = Math.round(245 + (110 - 245) * t);
  const b = Math.round(238 + (86 - 238) * t);
  const text = t > 0.5 ? '#fff' : '#0a3d2d';
  return { bg: 'rgb('+r+','+g+','+b+')', text };
}

function renderCell(val, scale, max, fmt) {
  if (val === null || val === undefined) return '<td class="none">-</td>';
  const c = scale(val, max);
  const text = fmt ? fmt(val) : val;
  return '<td style="background:'+c.bg+';color:'+c.text+'">'+text+'</td>';
}

function generateInsights(subject, grade) {
  const insights = [];
  const curYear = '2025-26', prevYear = '2024-25';

  // Build metrics per vertical for 2025-26, with delta vs 2024-25
  const data = {};
  verticals.forEach(v => {
    const dCur = getData(v, subject, grade, curYear);
    const dPrev = getData(v, subject, grade, prevYear);
    if (!dCur) return;
    data[v] = {
      l1drop: dCur.SOY[0] - dCur.EOY[0],
      l1dropPrev: dPrev ? dPrev.SOY[0] - dPrev.EOY[0] : null,
      l1eoy: dCur.EOY[0],
      l1eoyPrev: dPrev ? dPrev.EOY[0] : null,
      l34: dCur.EOY[2] + dCur.EOY[3],
      l34Prev: dPrev ? dPrev.EOY[2] + dPrev.EOY[3] : null,
      l4: dCur.EOY[3],
      l4Prev: dPrev ? dPrev.EOY[3] : null
    };
  });

  const available = Object.keys(data);
  if (available.length === 0) return [];

  // INSIGHT 1: Best performer this year
  let bestV = null, bestVal = -999;
  available.forEach(v => { if(data[v].l1drop > bestVal){ bestVal=data[v].l1drop; bestV=v; }});
  if (bestV && bestVal > 0) {
    const d = data[bestV];
    let text = '<strong>'+vShort[bestV]+'</strong> is leading this year with <strong>'+bestVal+'%</strong> L1 reduction';
    if (d.l1dropPrev !== null) {
      const diff = d.l1drop - d.l1dropPrev;
      if (diff > 0) text += ' (up from \u25BC'+d.l1dropPrev+' last year)';
      else if (diff < 0) text += ' (down from \u25BC'+d.l1dropPrev+' last year)';
      else text += ' (same as last year)';
    }
    text += '.';
    insights.push({ type:'positive', text });
  }

  // INSIGHT 2: Year-over-year improvements
  const improved = [];
  const declined = [];
  available.forEach(v => {
    if (data[v].l1dropPrev === null) return;
    const diff = data[v].l1drop - data[v].l1dropPrev;
    if (diff >= 5) improved.push({ v, diff });
    else if (diff <= -5) declined.push({ v, diff });
  });

  if (improved.length > 0) {
    improved.sort((a,b) => b.diff - a.diff);
    const top = improved[0];
    insights.push({ type:'positive', text:'<strong>'+vShort[top.v]+'</strong> improved the most this year. L1 reduction is up <strong>'+top.diff+' points</strong> vs last year.' });
  }

  if (declined.length > 0) {
    declined.sort((a,b) => a.diff - b.diff);
    const worst = declined[0];
    insights.push({ type:'negative', text:'<strong>'+vShort[worst.v]+'</strong> slowed down this year. L1 reduction dropped by <strong>'+Math.abs(worst.diff)+' points</strong> vs last year.' });
  }

  // INSIGHT 3: L1 increased (students moved backwards) this year
  available.forEach(v => {
    if (data[v].l1drop < 0) {
      insights.push({ type:'negative', text:'<strong>'+vShort[v]+'</strong> had L1 <strong>increase of '+Math.abs(data[v].l1drop)+'%</strong> this year. More students moved into L1 than out.' });
    }
  });

  // INSIGHT 4: Highest L3+L4 at EOY this year, with year-over-year
  let hiL34V = null, hiL34 = -1;
  available.forEach(v => { if(data[v].l34 > hiL34){ hiL34=data[v].l34; hiL34V=v; }});
  if (hiL34V && hiL34 >= 20) {
    const d = data[hiL34V];
    let text = '<strong>'+vShort[hiL34V]+'</strong> has the highest L3+L4 at EOY this year at <strong>'+hiL34+'%</strong>';
    if (d.l34Prev !== null) {
      const diff = d.l34 - d.l34Prev;
      if (diff > 0) text += ' (up '+diff+' points from '+d.l34Prev+'% last year)';
      else if (diff < 0) text += ' (down '+Math.abs(diff)+' points from '+d.l34Prev+'% last year)';
    }
    text += '.';
    insights.push({ type:'positive', text });
  }

  // INSIGHT 5: Concern - highest remaining L1 this year
  let hiL1V = null, hiL1 = -1;
  available.forEach(v => { if(data[v].l1eoy > hiL1){ hiL1=data[v].l1eoy; hiL1V=v; }});
  if (hiL1V && hiL1 >= 40) {
    const d = data[hiL1V];
    let text = '<strong>'+vShort[hiL1V]+'</strong> still has <strong>'+hiL1+'%</strong> at L1 by EOY this year';
    if (d.l1eoyPrev !== null) {
      const diff = d.l1eoy - d.l1eoyPrev;
      if (diff > 0) text += ' (worse than last year at '+d.l1eoyPrev+'%)';
      else if (diff < 0) text += ' (better than last year at '+d.l1eoyPrev+'%)';
      else text += ' (same as last year)';
    }
    text += '.';
    insights.push({ type:'negative', text });
  }

  // INSIGHT 6: L4 growth story this year
  let hiL4V = null, hiL4 = -1;
  available.forEach(v => { if(data[v].l4 > hiL4){ hiL4=data[v].l4; hiL4V=v; }});
  if (hiL4V && hiL4 >= 25) {
    const d = data[hiL4V];
    let text = '<strong>'+vShort[hiL4V]+'</strong> reached <strong>'+hiL4+'%</strong> at L4 this year';
    if (d.l4Prev !== null && d.l4 - d.l4Prev >= 5) {
      text += '  up '+(d.l4 - d.l4Prev)+' points from last year.';
    } else {
      text += '.';
    }
    insights.push({ type:'neutral', text });
  }

  return insights;
}

      l1Drops.forEach((drop, i) => {
        const bar = meta.data[i];

        let text = drop > 0 ? '\u25BC ' + drop : drop < 0 ? '\u25B2 ' + Math.abs(drop) : '-';

          ticks: { color: '#333', font: { size: 11, weight: '600' }, autoSkip: false, maxRotation: 0 },

          grid: { color: 'rgba(0,0,0,0.06)' }

      }
    }
  });
  charts.push(c);

  // Append insights below the chart
  const insights = generateInsights(oneViewSubject, oneViewGrade);

let soySubject = 'English', soyGrade = 'Grade 2', soyAllGrades = true;

function generateSoyEoyInsights(subject, grade) {
  const insights = [];
  const year = '2025-26';
  const data = {};

  verticals.forEach(v => {
    const d = getData(v, subject, grade, year);
    if (!d) return;
    data[v] = {
      l1drop: d.SOY[0] - d.EOY[0],
      l34gain: (d.EOY[2] + d.EOY[3]) - (d.SOY[2] + d.SOY[3]),
      l1soy: d.SOY[0], l1eoy: d.EOY[0],
      l34soy: d.SOY[2] + d.SOY[3], l34eoy: d.EOY[2] + d.EOY[3]
    };
  });

  const available = Object.keys(data);
  if (available.length === 0) return [];

  // Biggest L1 drop
  let bestL1V = null, bestL1 = -999;
  available.forEach(v => { if (data[v].l1drop > bestL1) { bestL1 = data[v].l1drop; bestL1V = v; }});
  if (bestL1V && bestL1 > 0) {
    insights.push({ type:'positive', text:'<strong>'+vShort[bestL1V]+'</strong> moved the most students out of L1 this year, reducing it by <strong>'+bestL1+'%</strong> (from '+data[bestL1V].l1soy+'% to '+data[bestL1V].l1eoy+'%).' });
  }

  // Biggest L3+L4 gain
  let bestL34V = null, bestL34 = -999;
  available.forEach(v => { if (data[v].l34gain > bestL34) { bestL34 = data[v].l34gain; bestL34V = v; }});
  if (bestL34V && bestL34 > 0) {
    insights.push({ type:'positive', text:'<strong>'+vShort[bestL34V]+'</strong> grew L3+L4 the most, adding <strong>'+bestL34+' points</strong> (from '+data[bestL34V].l34soy+'% to '+data[bestL34V].l34eoy+'%).' });
  }

  // Smallest L1 movement
  let weakV = null, weakVal = 999;
  available.forEach(v => { if (data[v].l1drop < weakVal) { weakVal = data[v].l1drop; weakV = v; }});
  if (weakV && weakVal < 5) {
    if (weakVal < 0) {
      insights.push({ type:'negative', text:'<strong>'+vShort[weakV]+'</strong> saw L1 <strong>increase by '+Math.abs(weakVal)+'%</strong> this year (more students moved into L1 than out).' });
    } else {
      insights.push({ type:'negative', text:'<strong>'+vShort[weakV]+'</strong> had the least L1 movement this year, only <strong>'+weakVal+'%</strong> of students moved out of L1.' });
    }
  }

  // Balanced mover - biggest combined L1 drop + L3+L4 gain
  let balancedV = null, balancedScore = -999;
  available.forEach(v => { const score = data[v].l1drop + data[v].l34gain; if (score > balancedScore) { balancedScore = score; balancedV = v; }});
  if (balancedV && balancedScore > 0 && balancedV !== bestL1V && balancedV !== bestL34V) {
    insights.push({ type:'neutral', text:'<strong>'+vShort[balancedV]+'</strong> showed the most balanced progress, with strong movement both out of L1 and into L3+L4.' });
  }

  return insights;
}

}

    const l1Col = l1drop > 0 ? '#0D6B50' : l1drop < 0 ? '#C0392B' : '#888';

    id: 'bucketBackground',
    beforeDatasetsDraw(chart) {

      const meta = chart.getDatasetMeta(0);
      const chartArea = chart.chartArea;
      if (!meta.data.length) return;

      ctx.save();
      // Draw bucket backgrounds (every pair)
      for (let i = 0; i < meta.data.length; i += 2) {
        if (i + 1 >= meta.data.length) break;
        const bar0 = meta.data[i];
        const bar1 = meta.data[i + 1];
        const padding = 12;
        const left = bar0.x - bar0.width / 2 - padding;
        const right = bar1.x + bar1.width / 2 + padding;
        const top = chartArea.top - 24;
        const bottom = chartArea.bottom + 4;

        // Alternating subtle bucket shade
        ctx.fillStyle = (i / 2) % 2 === 0 ? 'rgba(0,0,0,0.025)' : 'rgba(0,0,0,0.045)';
        ctx.beginPath();
        if (ctx.roundRect) {

  };

  const cv = document.getElementById('soyEoyCanvas');

    body.insertAdjacentHTML('beforeend', ih);
  }

  let heatH = '<div class="heatmap-wrap"><div class="heatmap-title">SOY to EOY movement heatmap (2025-26, darker = more movement): '+soySubject+', '+soyGrade+'</div>';

    heatH += '<td style="background:transparent;color:#555;font-weight:500">'+d.SOY[3]+'% \u2192 '+d.EOY[3]+'%</td>';
    heatH += '</tr>';
  });
  heatH += '</tbody></table></div>';
  body.insertAdjacentHTML('beforeend', heatH);
}

/* ── LEVEL JUMP HELPERS ───────────────────────────────────────────────── */
function jumpStats(startLvl, eoy) {
  // startLvl is 0-indexed (0=L1,1=L2,2=L3,3=L4)
  const total = eoy.reduce((a,b)=>a+b,0);
  let jumped=0, stayed=0, dropped=0;
  eoy.forEach((n,i)=>{
    if(i>startLvl) jumped+=n;
    else if(i===startLvl) stayed+=n;
    else dropped+=n;
  });
  return {total,jumped,stayed,dropped,
    jumpedPct:total>0?+(jumped/total*100).toFixed(1):0,
    stayedPct:total>0?+(stayed/total*100).toFixed(1):0,
    droppedPct:total>0?+(dropped/total*100).toFixed(1):0};
}

function jumpDepth(startLvl, eoy) {
  // Returns breakdown of how far students jumped
  const res = [];
  for(let i=startLvl+1;i<4;i++){
    if(eoy[i]>0) res.push({label:`→ L${i+1}`,n:eoy[i]});
  }
  return res;
}

let ljVertical = 'Foundations';
let ljSubject = 'English';
let ljGrade = 'Grade 2';
let ljCmpGrade = 'Grade 2';
let ljGradeCompare = false;

/* ── RENDER LEVEL JUMP ────────────────────────────────────────────────── */
function renderLevelJump() {
  destroyCharts();
  const el = document.getElementById('content');

  // Sub-tab toggle
  let h = `<div style="display:flex;justify-content:center;margin-bottom:24px;gap:0">
    <button onclick="ljView='standalone';renderLevelJump()" style="padding:10px 28px;font-size:13px;font-weight:600;border:1px solid #ccc;border-radius:8px 0 0 8px;cursor:pointer;font-family:inherit;${ljView==='standalone'?'background:#333;color:#fff;border-color:#333':'background:#f0f0f0;color:#666'}">Standalone</button>
    <button onclick="ljView='compare';renderLevelJump()" style="padding:10px 28px;font-size:13px;font-weight:600;border:1px solid #ccc;border-left:none;border-radius:0 8px 8px 0;cursor:pointer;font-family:inherit;${ljView==='compare'?'background:#333;color:#fff;border-color:#333':'background:#f0f0f0;color:#666'}">Compare (English)</button>
  </div>`;
  el.innerHTML = h + '<div id="lj-body"></div>';

  if(ljView==='standalone') renderLJStandalone();
  else renderLJCompare();
}

function renderLJStandalone() {
  const el = document.getElementById('lj-body');
  const verticals = Object.keys(JUMP_DATA);

  // Subject data
  const hasMaths = JUMP_DATA[ljVertical].Maths;
  if(!hasMaths) ljSubject = 'English';
  const subjectData = JUMP_DATA[ljVertical][ljSubject];
  const grades = subjectData.grades;
  if(!grades.includes(ljGrade)) ljGrade = grades[0];
  const themeCol = ljSubject==='English' ? '#185FA5' : '#0F6E56';

  // ── Build full nav HTML ──
  let h = '';

  // Vertical toggle
  h += '<div style="display:flex;justify-content:center;flex-wrap:wrap;gap:0;margin-bottom:16px">';
  verticals.forEach((v,i) => {
    const active = v===ljVertical;
    const first=i===0, last=i===verticals.length-1;
    h += `<button onclick="ljVertical='${v}';ljGradeCompare=false;ljGrade=JUMP_DATA['${v}'][ljSubject]?.grades[0]||'Grade 2';renderLJStandalone()"
      style="padding:9px 18px;font-size:12px;font-weight:600;border:1px solid #ccc;${first?'border-radius:8px 0 0 8px':last?'border-radius:0 8px 8px 0':'border-radius:0'};${i>0?'border-left:none':''};cursor:pointer;font-family:inherit;${active?'background:#333;color:#fff;border-color:#333':'background:#f0f0f0;color:#666'}">${v}</button>`;
  });
  h += '</div>';

  // Subject toggle (Foundations only)
  if(hasMaths) {
    h += '<div style="display:flex;justify-content:center;gap:0;margin-bottom:16px">';
    ['English','Maths'].forEach((s,i) => {
      const active = s===ljSubject;
      h += `<button onclick="ljSubject='${s}';ljGradeCompare=false;renderLJStandalone()" style="padding:8px 22px;font-size:12px;font-weight:600;border:1px solid #ccc;${i===0?'border-radius:8px 0 0 8px':'border-radius:0 8px 8px 0;border-left:none'};cursor:pointer;font-family:inherit;${active?`background:${s==='English'?'#185FA5':'#0F6E56'};color:#fff;border-color:${s==='English'?'#185FA5':'#0F6E56'}`:'background:#f0f0f0;color:#666'}">${s}</button>`;
    });
    h += '</div>';
  }

  // Grade tabs — "Grade Comparison" FIRST, then individual grades
  const gcActive = ljGradeCompare===true;
  h += '<div style="display:flex;justify-content:center;flex-wrap:wrap;gap:0;margin-bottom:24px">';
  h += `<button onclick="ljGradeCompare=true;renderLJStandalone()" style="padding:8px 16px;font-size:12px;font-weight:700;border:1px solid #ccc;border-radius:8px 0 0 8px;cursor:pointer;font-family:inherit;${gcActive?'background:#6B4DAA;color:#fff;border-color:#6B4DAA':'background:#EEF0FF;color:#6B4DAA'}">All Grades ▾</button>`;
  grades.forEach((g,i) => {
    const active = g===ljGrade && !gcActive;
    const last = i===grades.length-1;
    h += `<button onclick="ljGradeCompare=false;ljGrade='${g}';renderLJStandalone()" style="padding:8px 13px;font-size:12px;font-weight:${active?'600':'400'};border:1px solid #ccc;border-left:none;${last?'border-radius:0 8px 8px 0':'border-radius:0'};cursor:pointer;font-family:inherit;${active?`background:${themeCol};color:#fff;border-color:${themeCol}`:'background:#f0f0f0;color:#666'}">${g.replace('Grade ','G')}</button>`;
  });
  h += '</div>';

  // Content placeholder
  h += '<div id="lj-standalone-content"></div>';

  // Paint nav immediately
  el.innerHTML = h;

  // Now fill content
  const contentEl = document.getElementById('lj-standalone-content');
  if(ljGradeCompare) {
    renderLJGradeCompare(contentEl, subjectData, grades, themeCol);
  } else {
    renderLJCards(contentEl, subjectData, ljGrade, themeCol);
  }
}
function renderLJCards(el, subjectData, grade, themeCol) {
  const lvlNames = ['L1','L2','L3','L4'];
  const lvlKeys = ['L1','L2','L3','L4'];
  const lvlColors = ['#E24B4A','#EF9F27','#3266ad','#1D9E75'];
  const eoyColors = ['#E24B4A','#EF9F27','#3266ad','#1D9E75'];

  let h = `<div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:28px;flex-wrap:wrap">
    <div style="font-size:10px;font-weight:700;color:#aaa;letter-spacing:1px;text-transform:uppercase">How to read</div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">
      <div>
        <div style="font-size:10px;font-weight:700;color:#555;margin-bottom:6px">EOY bar — where students ended up</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          ${['L1','L2','L3','L4'].map((l,i)=>`<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#666"><div style="width:10px;height:10px;border-radius:2px;background:${eoyColors[i]}"></div>${l}</div>`).join('')}
        </div>
      </div>
      <div style="width:1px;background:#eee;align-self:stretch"></div>
      <div>
        <div style="font-size:10px;font-weight:700;color:#555;margin-bottom:6px">Stat boxes</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#0D6B50;font-weight:600"><span>↑ Jumped</span><span style="color:#aaa;font-weight:400">— moved to higher level</span></div>
          <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#666;font-weight:600"><span>→ Stayed</span><span style="color:#aaa;font-weight:400">— remained at same level</span></div>
          <div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#C0392B;font-weight:600"><span>↓ Dropped</span><span style="color:#aaa;font-weight:400">— moved to lower level</span></div>
        </div>
      </div>
      <div style="width:1px;background:#eee;align-self:stretch"></div>
      <div>
        <div style="font-size:10px;font-weight:700;color:#555;margin-bottom:6px">Jump breakdown</div>
        <div style="font-size:10px;color:#aaa">Purple bars show how many levels jumped (→L2, →L3, →L4)</div>
      </div>
    </div>
  </div>`;

  h += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px">';

  lvlKeys.forEach((lk,li) => {
    const entry = subjectData[lk]?.[grade];
    if(!entry) return;
    const {soy,eoy} = entry;
    const stats = jumpStats(li, eoy);
    const depth = jumpDepth(li, eoy);

    h += `<div style="background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:22px 24px;box-shadow:0 1px 4px rgba(0,0,0,.04)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:10px;height:10px;border-radius:50%;background:${lvlColors[li]}"></div>
          <span style="font-size:14px;font-weight:700;color:#1a1a1a">Started at ${lvlNames[li]}</span>
        </div>
        <span style="font-size:12px;font-weight:600;color:#888">${soy} students</span>
      </div>
      <div style="margin-bottom:16px">
        <div style="font-size:10px;font-weight:600;color:#aaa;letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px">EOY Distribution</div>
        <div style="display:flex;height:28px;border-radius:6px;overflow:hidden;background:#f5f5f2">`;
    eoy.forEach((n,i)=>{
      if(n===0)return;
      const pct=soy>0?(n/soy*100):0;
      const showLbl=pct>=8;
      h+=`<div style="width:${pct}%;background:${eoyColors[i]};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;overflow:hidden;white-space:nowrap" title="L${i+1}: ${n} (${pct.toFixed(1)}%)">${showLbl?n:''}</div>`;
    });
    h += `</div><div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:8px">`;
    eoy.forEach((n,i)=>{
      if(n===0)return;
      const pct=soy>0?(n/soy*100).toFixed(1):0;
      h+=`<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#666"><div style="width:8px;height:8px;border-radius:2px;background:${eoyColors[i]}"></div>L${i+1}: <strong>${n}</strong> (${pct}%)</div>`;
    });
    h += `</div></div>`;
    const statBoxes = [];
    if(stats.jumped>0) statBoxes.push(`<div style="background:#E8F5EF;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:#0D6B50;line-height:1">${stats.jumped}</div><div style="font-size:10px;color:#0D6B50;font-weight:600;margin-top:3px">Jumped ↑</div><div style="font-size:11px;color:#0D6B50;font-weight:700">${stats.jumpedPct}%</div></div>`);
    statBoxes.push(`<div style="background:#f5f5f2;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:#555;line-height:1">${stats.stayed}</div><div style="font-size:10px;color:#888;font-weight:600;margin-top:3px">Stayed →</div><div style="font-size:11px;color:#888;font-weight:700">${stats.stayedPct}%</div></div>`);
    if(stats.dropped>0) statBoxes.push(`<div style="background:#FCEAEA;border-radius:8px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:800;color:#C0392B;line-height:1">${stats.dropped}</div><div style="font-size:10px;color:#C0392B;font-weight:600;margin-top:3px">Dropped ↓</div><div style="font-size:11px;color:#C0392B;font-weight:700">${stats.droppedPct}%</div></div>`);
    h += `<div style="display:grid;grid-template-columns:repeat(${statBoxes.length},1fr);gap:8px;margin-bottom:${depth.length?'14px':'0'}">${statBoxes.join('')}</div>`;
    if(depth.length) {
      h += `<div style="border-top:1px solid #f0f0ec;padding-top:12px">
        <div style="font-size:10px;font-weight:600;color:#aaa;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px">Jump breakdown</div>`;
      depth.forEach(d=>{
        const pct=soy>0?(d.n/soy*100).toFixed(1):0;
        h+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div style="font-size:11px;color:#666;width:40px;flex-shrink:0">${d.label}</div>
          <div style="flex:1;height:14px;background:#f0f0f0;border-radius:4px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:#6B4DAA;border-radius:4px"></div>
          </div>
          <div style="font-size:11px;font-weight:700;color:#6B4DAA;width:60px;text-align:right">${d.n} (${pct}%)</div>
        </div>`;
      });
      h += '</div>';
    }
    h += '</div>';
  });

  h += '</div>';
  el.innerHTML = h;
}

function renderLJGradeCompare(el, subjectData, grades, themeCol) {
  const lvlKeys = ['L1','L2','L3','L4'];
  const lvlLabels = ['Level 1','Level 2','Level 3','Level 4'];
  const lvlColors = ['#E24B4A','#EF9F27','#3266ad','#1D9E75'];

  let h = `<div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:24px;flex-wrap:wrap">
    <div style="font-size:10px;font-weight:700;color:#aaa;letter-spacing:1px;text-transform:uppercase">How to read</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#0D6B50;font-weight:600"><div style="width:16px;height:10px;border-radius:2px;background:#0D6B50"></div>↑ Jumped</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#666;font-weight:600"><div style="width:16px;height:10px;border-radius:2px;background:#bbb"></div>→ Stayed</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#E24B4A;font-weight:600"><div style="width:16px;height:10px;border-radius:2px;background:#E24B4A"></div>↓ Dropped</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#6B4DAA;font-weight:600"><div style="width:16px;height:10px;border-radius:2px;background:#6B4DAA;opacity:0.8"></div>Jump depth</div>
    </div>
    <div style="margin-left:auto;font-size:10px;color:#ccc;font-style:italic">🏆 = highest % jumped in that level</div>
  </div>`;

  h += '<div style="display:flex;flex-direction:column;gap:20px">';

  lvlKeys.forEach((lk, li) => {
    const gradesWithData = grades.filter(g => subjectData[lk]?.[g]);
    if(!gradesWithData.length) return;

    // Find best grade (highest % jumped for L1-L3, highest % stayed for L4)
    let bestGrade = null, bestPct = -1;
    gradesWithData.forEach(g => {
      const {soy,eoy} = subjectData[lk][g];
      const s = jumpStats(li,eoy);
      const metric = lk==='L4' ? s.stayedPct : s.jumpedPct;
      if(metric > bestPct) { bestPct = metric; bestGrade = g; }
    });

    h += `<div style="background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:22px 24px;box-shadow:0 1px 4px rgba(0,0,0,.04)">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
        <div style="width:10px;height:10px;border-radius:50%;background:${lvlColors[li]}"></div>
        <div style="font-size:14px;font-weight:700;color:#1a1a1a">${lvlLabels[li]} → EOY Movement</div>
        <div style="margin-left:auto;font-size:11px;color:#aaa">${gradesWithData.length} grades · all values in %</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(${Math.min(gradesWithData.length,4)},1fr);gap:12px">`;

    gradesWithData.forEach(g => {
      const {soy,eoy} = subjectData[lk][g];
      const stats = jumpStats(li, eoy);
      const depth = jumpDepth(li, eoy);
      const isBest = g === bestGrade;

      h += `<div style="background:${isBest?'#F0FFF7':'#f8f8f8'};border:1px solid ${isBest?'#0D6B50':'#eee'};border-radius:10px;padding:14px;position:relative">
        ${isBest?`<div style="position:absolute;top:8px;right:8px;font-size:12px" title="Highest % jumped">🏆</div>`:''}
        <!-- Grade header -->
        <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:10px">
          <div style="font-size:15px;font-weight:800;color:${themeCol}">${g.replace('Grade ','G')}</div>
          <div style="font-size:10px;color:#aaa">n=${soy}</div>
        </div>
        <!-- Main stacked bar -->
        <div style="display:flex;height:24px;border-radius:5px;overflow:hidden;margin-bottom:6px;box-shadow:0 1px 3px rgba(0,0,0,.08)">
          ${stats.jumped>0?`<div style="width:${stats.jumpedPct}%;background:#0D6B50;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;overflow:hidden" title="Jumped: ${stats.jumpedPct}%">${stats.jumpedPct>=15?stats.jumpedPct+'%':''}</div>`:''}
          <div style="width:${stats.stayedPct}%;background:#bbb;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;overflow:hidden" title="Stayed: ${stats.stayedPct}%">${stats.stayedPct>=15?stats.stayedPct+'%':''}</div>
          ${stats.dropped>0?`<div style="width:${stats.droppedPct}%;background:#E24B4A;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;overflow:hidden" title="Dropped: ${stats.droppedPct}%">${stats.droppedPct>=15?stats.droppedPct+'%':''}</div>`:''}
        </div>
        <!-- % labels row -->
        <div style="display:flex;justify-content:space-around;margin-bottom:10px">
          ${stats.jumped>0?`<div style="text-align:center"><div style="font-size:14px;font-weight:800;color:#0D6B50;line-height:1">${stats.jumpedPct}%</div><div style="font-size:9px;color:#0D6B50;margin-top:1px">↑ jumped</div></div>`:''}
          <div style="text-align:center"><div style="font-size:14px;font-weight:700;color:#888;line-height:1">${stats.stayedPct}%</div><div style="font-size:9px;color:#aaa;margin-top:1px">→ stayed</div></div>
          ${stats.dropped>0?`<div style="text-align:center"><div style="font-size:14px;font-weight:700;color:#E24B4A;line-height:1">${stats.droppedPct}%</div><div style="font-size:9px;color:#E24B4A;margin-top:1px">↓ dropped</div></div>`:''}
        </div>`;

      // Jump depth
      if(depth.length) {
        h += `<div style="border-top:1px solid #eee;padding-top:8px">`;
        depth.forEach(d => {
          const pct = soy>0 ? +(d.n/soy*100).toFixed(1) : 0;
          h += `<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">
            <div style="font-size:9px;color:#888;width:28px;flex-shrink:0">${d.label}</div>
            <div style="flex:1;height:10px;background:#e8e8e8;border-radius:3px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:#6B4DAA;opacity:0.8;border-radius:3px"></div>
            </div>
            <div style="font-size:9px;font-weight:700;color:#6B4DAA;width:34px;text-align:right">${pct}%</div>
          </div>`;
        });
        h += '</div>';
      }
      h += '</div>';
    });

    h += '</div></div>';
  });

  h += '</div>';
  el.innerHTML = h;
}

function renderLJCompare() {
  const el = document.getElementById('lj-body');
  const cmpVerticals = ['Foundations','AMC - Model','AMC - Non - Model'];
  const vColors = {'Foundations':'#185FA5','AMC - Model':'#C47A1A','AMC - Non - Model':'#C0392B'};
  const cmpGrades = ['Grade 2','Grade 3','Grade 4','Grade 5'];
  const lvlNames = ['L1','L2','L3','L4'];

  // Grade selector
  let h = '<div style="display:flex;justify-content:center;gap:0;margin-bottom:24px">';
  cmpGrades.forEach((g,i)=>{
    const active=g===ljCmpGrade;
    h+=`<button onclick="ljCmpGrade='${g}';renderLJCompare()" style="padding:9px 18px;font-size:13px;font-weight:600;border:1px solid #ccc;${i===0?'border-radius:8px 0 0 8px':i===cmpGrades.length-1?'border-radius:0 8px 8px 0':'border-radius:0'};${i>0?'border-left:none':''};cursor:pointer;font-family:inherit;${active?'background:#333;color:#fff;border-color:#333':'background:#f0f0f0;color:#666'}">${g}</button>`;
  });
  h += '</div>';

  // For each starting level, show side-by-side % jumped
  h += '<div style="display:flex;flex-direction:column;gap:16px">';

  ['L1','L2','L3','L4'].forEach((lk,li)=>{
    // Check if any vertical has data for this level+grade
    const hasData = cmpVerticals.some(v=>JUMP_DATA[v]?.English?.[lk]?.[ljCmpGrade]);
    if(!hasData) return;

    h+=`<div style="background:#fff;border:1px solid #e0e0e0;border-radius:14px;padding:22px 24px;box-shadow:0 1px 4px rgba(0,0,0,.04)">
      <div style="font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:18px">Students who started at ${lvlNames[li]} — % Jumped, Stayed, Dropped</div>
      <div style="display:grid;grid-template-columns:repeat(${cmpVerticals.length},1fr);gap:16px">`;

    cmpVerticals.forEach(v=>{
      const entry = JUMP_DATA[v]?.English?.[lk]?.[ljCmpGrade];
      const col = vColors[v];
      if(!entry){
        h+=`<div style="background:#f8f8f8;border-radius:10px;padding:16px;text-align:center">
          <div style="font-size:11px;font-weight:700;color:#aaa;margin-bottom:8px">${v}</div>
          <div style="font-size:12px;color:#ccc">No data</div>
        </div>`;
        return;
      }
      const {soy,eoy}=entry;
      const stats=jumpStats(li,eoy);
      const depth=jumpDepth(li,eoy);

      h+=`<div style="background:#f8f8f8;border-radius:10px;padding:16px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;color:${col}">${v}</div>
          <div style="font-size:10px;color:#aaa">n=${soy}</div>
        </div>
        <!-- stacked bar -->
        <div style="display:flex;height:20px;border-radius:5px;overflow:hidden;margin-bottom:10px">
          <div style="width:${stats.jumpedPct}%;background:#0D6B50" title="Jumped: ${stats.jumpedPct}%"></div>
          <div style="width:${stats.stayedPct}%;background:#bbb" title="Stayed: ${stats.stayedPct}%"></div>
          <div style="width:${stats.droppedPct}%;background:#E24B4A" title="Dropped: ${stats.droppedPct}%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:12px">
          <span style="color:#0D6B50;font-weight:700">↑ ${stats.jumpedPct}%</span>
          <span style="color:#888;font-weight:600">→ ${stats.stayedPct}%</span>
          <span style="color:${stats.droppedPct>0?'#E24B4A':'#ccc'};font-weight:700">↓ ${stats.droppedPct}%</span>
        </div>
        <!-- jump depth -->`;
      if(depth.length){
        depth.forEach(d=>{
          const pct=soy>0?(d.n/soy*100).toFixed(1):0;
          h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <div style="font-size:10px;color:#888;width:36px;flex-shrink:0">${d.label}</div>
            <div style="flex:1;height:10px;background:#e8e8e8;border-radius:3px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:${col};opacity:0.8"></div>
            </div>
            <div style="font-size:10px;font-weight:700;color:${col};width:42px;text-align:right">${pct}%</div>
          </div>`;
        });
      }
      h+='</div>';
    });

    h+='</div></div>';
  });

  h+='</div>';

  // Legend
  h+=`<div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;gap:32px;flex-wrap:wrap">
    <div style="font-size:10px;font-weight:700;color:#aaa;letter-spacing:1px;text-transform:uppercase">How to read</div>
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:12px;border-radius:3px;background:#0D6B50"></div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#0D6B50">Jumped ↑</div>
          <div style="font-size:10px;color:#aaa">moved to a higher level</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:12px;border-radius:3px;background:#bbb"></div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#666">Stayed →</div>
          <div style="font-size:10px;color:#aaa">remained at same level</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:12px;border-radius:3px;background:#E24B4A"></div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#E24B4A">Dropped ↓</div>
          <div style="font-size:10px;color:#aaa">moved to a lower level</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:12px;border-radius:3px;background:#6B4DAA;opacity:0.8"></div>
        <div>
          <div style="font-size:11px;font-weight:700;color:#6B4DAA">→ L2 / L3 / L4</div>
          <div style="font-size:10px;color:#aaa">depth of jump by level</div>
        </div>
      </div>
    </div>
    <div style="margin-left:auto;font-size:10px;color:#ccc;font-style:italic">n = total students at that level at SOY</div>
  </div>`;

  el.innerHTML = h;
}

function buildNav() {
  const navEl = document.getElementById('mainNav');
  navEl.innerHTML = '';
  navEl.style.display = 'flex';
  navEl.style.justifyContent = 'center';

  const tabs = [
    {key:'SoyEoy', label:'SOY → EOY Comparison'},
    {key:'LevelJump', label:'Level Jump'}
  ];

  tabs.forEach((tab,i) => {
    const btn = document.createElement('button');
    btn.textContent = tab.label;
    btn.dataset.view = tab.key;
    if(i===0) btn.style.borderRadius='8px 0 0 8px';
    else if(i===tabs.length-1) btn.style.borderRadius='0 8px 8px 0';
    btn.addEventListener('click', ()=>{
      currentView = tab.key;
      render();
    });
    navEl.appendChild(btn);
  });
}

function render() {
  updateNav();
  if(currentView==='SoyEoy') renderSoyEoy();
  else if(currentView==='LevelJump') renderLevelJump();
}

buildNav();
render();

</script>
</body>
</html>
