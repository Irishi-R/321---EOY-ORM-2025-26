  const improved=[],declined=[];available.forEach(v=>{if(data[v].l1dropPrev===null)return;const diff=data[v].l1drop-data[v].l1dropPrev;if(diff>=5)improved.push({v,diff});else if(diff<=-5)declined.push({v,diff});});

  let hiL1V=null,hiL1=-1;available.forEach(v=>{if(data[v].l1eoy>hiL1){hiL1=data[v].l1eoy;hiL1V=v;}});
  if(hiL1V&&hiL1>=40){const d=data[hiL1V];let text='<strong>'+vShort[hiL1V]+'</strong> still has <strong>'+hiL1+'%</strong> at L1 by EOY this year';if(d.l1eoyPrev!==null){const diff=d.l1eoy-d.l1eoyPrev;if(diff>0)text+=' (worse than last year at '+d.l1eoyPrev+'%)';else if(diff<0)text+=' (better than last year at '+d.l1eoyPrev+'%)';else text+=' (same as last year)';}text+='.';insights.push({type:'negative',text});}
  let hiL4V=null,hiL4=-1;available.forEach(v=>{if(data[v].l4>hiL4){hiL4=data[v].l4;hiL4V=v;}});
  if(hiL4V&&hiL4>=25){const d=data[hiL4V];let text='<strong>'+vShort[hiL4V]+'</strong> reached <strong>'+hiL4+'%</strong> at L4 this year';if(d.l4Prev!==null&&d.l4-d.l4Prev>=5)text+=' — up '+(d.l4-d.l4Prev)+' points from last year.';else text+='.';insights.push({type:'neutral',text});}
  return insights;
}

function generateSoyEoyInsights(subject,grade){
  const insights=[];const data={};
  verticals.forEach(v=>{const d24=getData(v,subject,grade,'2024-25');const d25=getData(v,subject,grade,'2025-26');if(!d25)return;data[v]={l1drop25:d25.SOY[0]-d25.EOY[0],l1drop24:d24?d24.SOY[0]-d24.EOY[0]:null,l34gain25:(d25.EOY[2]+d25.EOY[3])-(d25.SOY[2]+d25.SOY[3]),l34gain24:d24?(d24.EOY[2]+d24.EOY[3])-(d24.SOY[2]+d24.SOY[3]):null,l1soy25:d25.SOY[0],l1eoy25:d25.EOY[0]};});
  const available=Object.keys(data);if(available.length===0)return[];
  let bestV=null,bestVal=-999;available.forEach(v=>{if(data[v].l1drop25>bestVal){bestVal=data[v].l1drop25;bestV=v;}});
  if(bestV&&bestVal>0){const d=data[bestV];let text='<strong>'+vShort[bestV]+'</strong> moved the most students out of L1 in 2025-26: <strong>'+bestVal+'%</strong> reduction ('+d.l1soy25+'% \u2192 '+d.l1eoy25+'%)';if(d.l1drop24!==null){const diff=bestVal-d.l1drop24;if(diff>0)text+=', <strong>\u25B2 '+diff+' pts</strong> better than last year';else if(diff<0)text+=', <strong>\u25BC '+Math.abs(diff)+' pts</strong> below last year';else text+=', same as last year';}text+='.';insights.push({type:'positive',text});}
  let impV=null,impDiff=-999;available.forEach(v=>{if(data[v].l1drop24===null)return;const diff=data[v].l1drop25-data[v].l1drop24;if(diff>impDiff){impDiff=diff;impV=v;}});
  if(impV&&impDiff>=5&&impV!==bestV)insights.push({type:'positive',text:'<strong>'+vShort[impV]+'</strong> showed the biggest year-over-year improvement: L1 change up by <strong>'+impDiff+' points</strong> vs 2024-25.'});
  available.forEach(v=>{if(data[v].l1drop24!==null&&data[v].l1drop25-data[v].l1drop24<=-8)insights.push({type:'negative',text:'<strong>'+vShort[v]+'</strong> regressed this year: L1 change fell by <strong>'+Math.abs(data[v].l1drop25-data[v].l1drop24)+' points</strong> vs 2024-25.'});if(data[v].l1drop25<0)insights.push({type:'negative',text:'<strong>'+vShort[v]+'</strong> saw L1 <strong>increase by '+Math.abs(data[v].l1drop25)+'%</strong> this year — more students moved into L1 than out.'});});
  let bestL34V=null,bestL34=-999;available.forEach(v=>{if(data[v].l34gain25>bestL34){bestL34=data[v].l34gain25;bestL34V=v;}});
  if(bestL34V&&bestL34>0&&bestL34V!==bestV){const d=data[bestL34V];let text='<strong>'+vShort[bestL34V]+'</strong> had the strongest L3+L4 gain in 2025-26: <strong>+'+bestL34+' points</strong>';if(d.l34gain24!==null){const diff=bestL34-d.l34gain24;if(diff>0)text+=' (\u25B2 '+diff+' pts YoY)';else if(diff<0)text+=' (\u25BC '+Math.abs(diff)+' pts YoY)';else text+=' (same as last year)';}text+='.';insights.push({type:'positive',text});}
  return insights;
}

// Neutral purple scale: both +ve and -ve get purple shading; darker = bigger absolute change
function heatNeutralPurple(val,max){
  if(val===null||val===undefined)return{bg:'#f5f5f5',text:'#bbb'};
  const t=Math.max(0,Math.min(1,Math.abs(val)/max));
  const r=Math.round(238+(107-238)*t),g=Math.round(237+(77-237)*t),b=Math.round(254+(170-254)*t);
  return{bg:'rgb('+r+','+g+','+b+')',text:t>0.5?'#fff':'#3c2870'};
}

function renderScorecard(){
  destroyCharts();const body=document.getElementById('content');

  // Compute overall stats
  let totalCombos=0,improvedCombos=0,sumChg=0,countChg=0;
  ['English','Maths'].forEach(s=>{verticals.forEach(v=>{ALL_DATA[v].grades.forEach(g=>{const d24=getData(v,s,g,'2024-25'),d25=getData(v,s,g,'2025-26');if(!d24||!d25)return;totalCombos++;const chg=(d25.SOY[0]-d25.EOY[0])-(d24.SOY[0]-d24.EOY[0]);if(chg>0)improvedCombos++;sumChg+=chg;countChg++;});});});
  const avgChg=countChg>0?(sumChg/countChg).toFixed(1):0;
  const impPct=totalCombos>0?Math.round(improvedCombos/totalCombos*100):0;

  const badge=(val)=>{const cls=val>0?'up':val<0?'down':'flat';const txt=val>0?'\u25B2 +'+val:val<0?'\u25BC '+val:'\u2014';return'<span class="metric-badge '+cls+'">'+txt+'</span>';};
  const metRow=(label,v24,v25,trend)=>'<div class="metric-row"><div class="metric-label">'+label+'</div><div class="metric-values"><span class="metric-prev">'+v24+'%</span><span style="color:#ddd;font-size:11px;margin:0 2px"> \u2192 </span><span class="metric-curr">'+v25+'%</span>'+badge(trend)+'</div></div>';

  let html='<div class="summary-banner">';
  html+='<div><div class="summary-stat-val">'+totalCombos+'</div><div class="summary-stat-label">Grade × Vertical combos</div></div>';
  html+='<div><div class="summary-stat-val">'+impPct+'%</div><div class="summary-stat-label">Improved L1 change YoY</div></div>';
  html+='<div><div class="summary-stat-val">'+(avgChg>0?'+':'')+avgChg+'</div><div class="summary-stat-label">Avg L1 change change (pts)</div></div>';
  html+='<div><div class="summary-stat-val">4</div><div class="summary-stat-label">Verticals tracked</div></div>';
  html+='</div>';

  ['English','Maths'].forEach(subject=>{
    html+='<div class="scorecard-section-label">'+subject+'</div><div class="scorecard-grid">';
    verticals.forEach(v=>{
      if(!ALL_DATA[v][subject])return;
      const valid=ALL_DATA[v].grades.filter(g=>getData(v,subject,g,'2024-25')&&getData(v,subject,g,'2025-26'));
      if(!valid.length)return;
      let sL1d24=0,sL1d25=0,sL34g24=0,sL34g25=0,bestG='',bestGVal=-999,worstG='',worstGVal=999;
      valid.forEach(g=>{
        const d24=getData(v,subject,g,'2024-25'),d25=getData(v,subject,g,'2025-26');
        const l1d24=d24.SOY[0]-d24.EOY[0],l1d25=d25.SOY[0]-d25.EOY[0];
        const l34g24=(d24.EOY[2]+d24.EOY[3])-(d24.SOY[2]+d24.SOY[3]);
        const l34g25=(d25.EOY[2]+d25.EOY[3])-(d25.SOY[2]+d25.SOY[3]);
        sL1d24+=l1d24;sL1d25+=l1d25;sL34g24+=l34g24;sL34g25+=l34g25;
        const chg=l1d25-l1d24;
        if(chg>bestGVal){bestGVal=chg;bestG=g;}
        if(chg<worstGVal){worstGVal=chg;worstG=g;}
      });
      const n=valid.length;
      const aL1d24=Math.round(sL1d24/n),aL1d25=Math.round(sL1d25/n);
      const aL34g24=Math.round(sL34g24/n),aL34g25=Math.round(sL34g25/n);
      const l1t=aL1d25-aL1d24,l34t=aL34g25-aL34g24;
      html+='<div class="scorecard-card">';
      html+='<div class="scorecard-card-title">'+vShort[v]+'<span style="font-size:11px;font-weight:400;color:#aaa;margin-left:8px">'+n+' grade'+(n>1?'s':'')+'</span></div>';
      html+=metRow('Avg L1 Change',aL1d24,aL1d25,l1t);
      html+=metRow('Avg L3+L4 Gain',aL34g24,aL34g25,l34t);
      html+='<div style="font-size:11px;color:#aaa;margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0;display:flex;justify-content:space-between">';
      if(bestG)html+='<span>Most improved: <strong style="color:#6B4DAA">'+bestG+'</strong> <span style="color:#0F6E56">(\u25B2+'+(bestGVal>0?bestGVal:0)+' pts)</span></span>';
      if(worstG&&worstGVal<0)html+='<span>Declined: <strong style="color:#6B4DAA">'+worstG+'</strong> <span style="color:#E24B4A">(\u25BC'+Math.abs(worstGVal)+' pts)</span></span>';
      html+='</div></div>';
    });
    html+='</div>';
  });
  body.innerHTML=html;
}

function renderHydAllGrades(vName, vData, grades, th) {

  });

  const plugin={id:'hydAllPlugin',
    beforeDatasetsDraw(chart){
      const ctx=chart.ctx,meta=chart.getDatasetMeta(0),ca=chart.chartArea;
      if(!meta.data.length)return;ctx.save();

        const left=b0.x-b0.width/2-pad,right=b3.x+b3.width/2+pad;
        ctx.fillStyle=(i/4)%2===0?'rgba(0,0,0,0.03)':'rgba(0,0,0,0.06)';
        ctx.beginPath();if(ctx.roundRect)ctx.roundRect(left,ca.top-38,right-left,ca.bottom-ca.top+42,8);else ctx.rect(left,ca.top-38,right-left,ca.bottom-ca.top+42);ctx.fill();
        ctx.strokeStyle=(i/4)%2===0?'rgba(0,0,0,0.10)':'rgba(0,0,0,0.16)';ctx.lineWidth=1.5;
        ctx.beginPath();if(ctx.roundRect)ctx.roundRect(left,ca.top-38,right-left,ca.bottom-ca.top+42,8);else ctx.rect(left,ca.top-38,right-left,ca.bottom-ca.top+42);ctx.stroke();
        const b1=meta.data[i+1],b2=meta.data[i+2];
        const soyCol=detailSubject==='English'?'rgba(24,95,165,0.08)':'rgba(15,110,86,0.08)';
        const eoyCol=detailSubject==='English'?'rgba(24,95,165,0.14)':'rgba(15,110,86,0.14)';
        ctx.fillStyle=soyCol;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(b0.x-b0.width/2-3,ca.top-6,b1.x+b1.width/2+3-(b0.x-b0.width/2-3),ca.bottom-ca.top+10,4);else ctx.rect(b0.x-b0.width/2-3,ca.top-6,b1.x+b1.width/2+3-(b0.x-b0.width/2-3),ca.bottom-ca.top+10);ctx.fill();
        ctx.fillStyle=eoyCol;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(b2.x-b2.width/2-3,ca.top-6,b3.x+b3.width/2+3-(b2.x-b2.width/2-3),ca.bottom-ca.top+10,4);else ctx.rect(b2.x-b2.width/2-3,ca.top-6,b3.x+b3.width/2+3-(b2.x-b2.width/2-3),ca.bottom-ca.top+10);ctx.fill();
      }ctx.restore();
    },
    afterDatasetsDraw(chart){
      const ctx=chart.ctx,meta=chart.getDatasetMeta(0),ca=chart.chartArea,last=chart.getDatasetMeta(chart.data.datasets.length-1);
      if(!meta.data.length)return;ctx.save();ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.font='700 11px -apple-system,sans-serif';ctx.fillStyle='#444';
      for(let i=0;i<meta.data.length;i+=4){if(i+3>=meta.data.length)break;ctx.fillText(availG[i/4].replace('Grade ','G'),(meta.data[i].x+meta.data[i+3].x)/2,ca.top-22);}
      ctx.font='600 9px -apple-system,sans-serif';
      for(let i=0;i<meta.data.length;i+=4){if(i+3>=meta.data.length)break;const b0=meta.data[i],b1=meta.data[i+1],b2=meta.data[i+2],b3=meta.data[i+3];ctx.fillStyle=th.tabActive;ctx.fillText('SOY',(b0.x+b1.x)/2,ca.top-8);ctx.fillStyle=th.eoy;ctx.fillText('EOY',(b2.x+b3.x)/2,ca.top-8);}
      ctx.font='bold 9px -apple-system,sans-serif';ctx.fillStyle=deltaC;
      barMeta.forEach((m,i)=>{if(m.drop===null||m.drop===undefined)return;const x=meta.data[i].x,topY=last.data[i].y,d=m.drop;ctx.fillText(d>0?'\u25BC'+d:d<0?'\u25B2'+Math.abs(d):'-',x,topY-3);});
      ctx.restore();
    }
  };

  let legendH='<div style="display:flex;justify-content:center;gap:14px;margin-bottom:16px;font-size:12px;color:#888;flex-wrap:wrap">';

  legendH+=`<span style="display:flex;align-items:center;gap:6px"><span style="width:20px;height:3px;background:${th.eoy};display:inline-block;border-radius:2px"></span>EOY</span>`;
  legendH+='<span style="display:flex;align-items:center;gap:6px"><span style="color:#0D6B50;font-weight:800">▼</span><span style="color:#C0392B;font-weight:800">▲</span><span style="color:#888;font-size:12px"> L1 change</span></span></div>';

  document.getElementById('detLegend').innerHTML=legendH;

  const cv=document.getElementById('hydAllCanvas');
  const c=new Chart(cv,{type:'bar',data:{labels,datasets:[
    {label:'L1',data:l1D,backgroundColor:segC[0],borderWidth:0,stack:'a'},
    {label:'L2',data:l2D,backgroundColor:segC[1],borderWidth:0,stack:'a'},
    {label:'L3',data:l3D,backgroundColor:segC[2],borderWidth:0,stack:'a'},
    {label:'L4',data:l4D,backgroundColor:segC[3],borderWidth:0,stack:'a'}
  ]},plugins:[plugin],options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:44}},
    plugins:{legend:{display:false},tooltip:{callbacks:{title:ctx=>{const m=barMeta[ctx[0].dataIndex];return m.g+' · '+m.period+' '+m.year;},label:ctx=>ctx.dataset.label+': '+ctx.raw+'%'}},
    datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>=8,color:ctx=>ctx.datasetIndex===1?'#5a3e00':'#fff',font:{size:9,weight:'600'},formatter:v=>v+'%'}},
    scales:{x:{stacked:true,ticks:{color:'#555',font:{size:9,weight:'600'},autoSkip:false,maxRotation:0},grid:{display:false}},
    y:{stacked:true,max:110,ticks:{color:'#999',callback:v=>v<=100?v+'%':'',font:{size:11},stepSize:25},grid:{color:'rgba(0,0,0,0.06)'}}}}});
  charts.push(c);

  // YoY Change heatmaps below chart
  const yoyGrades = grades;
  const buildHydHeat=(metric,title,scale)=>{
    let h=`<div class="heatmap-wrap" style="margin-top:20px"><div class="heatmap-title">${title}</div>`;
    h+=`<table class="heatmap-table"><thead><tr><th>Subject</th>`;
    yoyGrades.forEach(g=>{h+=`<th>${g.replace('Grade ','G')}</th>`;});
    h+=`</tr></thead><tbody>`;
    ['English','Maths'].forEach(subj=>{
      h+=`<tr><td>${subj}</td>`;
      yoyGrades.forEach(g=>{
        const d24=getData(vName,subj,g,'2024-25'),d25=getData(vName,subj,g,'2025-26');
        if(!d24||!d25){h+='<td class="none">—</td>';return;}
        let val24,val25;
        if(metric==='l1drop'){val24=d24.SOY[0]-d24.EOY[0];val25=d25.SOY[0]-d25.EOY[0];}
        else{val24=(d24.EOY[2]+d24.EOY[3])-(d24.SOY[2]+d24.SOY[3]);val25=(d25.EOY[2]+d25.EOY[3])-(d25.SOY[2]+d25.SOY[3]);}
        const chg=val25-val24;
        const c=chg>0?heatGreenScale(chg,30):chg<0?heatRedScale(-chg,30):{bg:'#f5f5f5',text:'#999'};
        const arrow=chg>0?'\u25B2 +'+chg:chg<0?'\u25BC '+chg:'\u2014';
        h+=`<td style="background:${c.bg};color:${c.text};line-height:1.5;cursor:default" title="24-25: ${val24} | 25-26: ${val25}">`;
        h+=`<div style="font-size:12px;font-weight:700">${arrow}</div>`;
        h+=`<div style="font-size:9px;opacity:0.75">${val24} \u2192 ${val25}</div></td>`;
      });
      h+=`</tr>`;
    });
    h+=`</tbody></table></div>`;return h;
  };

  detBody.insertAdjacentHTML('beforeend',
    buildHydHeat('l1drop',`L1 Change — YoY Change (2024-25 → 2025-26) · green = improved · red = declined`,'green')+
    buildHydHeat('l34gain',`L3+L4 Growth — YoY Change (2024-25 → 2025-26) · green = grew · red = declined`,'green')
  );
}

    '<div style="background:#f8f8f8;border:1px solid #e0e0e0;border-radius:14px;padding:24px 16px 16px;margin-bottom:20px">' +
      '<div style="font-size:13px;font-weight:600;color:#777;text-align:center;margin-bottom:14px">SOY \u2192 EOY · '+lcpsSubject+' · '+lcpsGrade+'</div>' +
      '<div style="position:relative;width:100%;height:380px"><canvas id="lcpsCanvas"></canvas></div>' +
    '</div>' +
    '<div id="lcpsTable"></div>';

  const cv = document.getElementById('lcpsCanvas');
  const c = new Chart(cv, {
    type:'bar',
    data:{labels,datasets:[
      {label:'Green',data:gD,backgroundColor:LCPS_COLORS[0],borderWidth:0,stack:'a'},
      {label:'Yellow',data:yD,backgroundColor:LCPS_COLORS[1],borderWidth:0,stack:'a'},
      {label:'Red',data:rD,backgroundColor:LCPS_COLORS[2],borderWidth:0,stack:'a'}
    ]},
    plugins:[lcpsPlugin],
    options:{
      responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:44}},
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{
          title:ctx=>{const m=barMeta[ctx[0].dataIndex];return 'LCPS · '+m.period+' '+m.year;},
          label:ctx=>ctx.dataset.label+': '+ctx.raw+'%'
        }},
        datalabels:{display:ctx=>ctx.dataset.data[ctx.dataIndex]>=8,color:'#fff',font:{size:10,weight:'700'},formatter:v=>v+'%'}
      },
      scales:{
        x:{stacked:true,ticks:{color:'#555',font:{size:11,weight:'600'},autoSkip:false,maxRotation:0},grid:{display:false}},
        y:{stacked:true,max:110,ticks:{color:'#999',callback:v=>v<=100?v+'%':'',font:{size:11},stepSize:25},grid:{color:'rgba(0,0,0,0.06)'}}
      }
    }
  });
  charts.push(c);

  // Summary table
  let tH = '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px">';
  ['2024-25','2025-26'].forEach(year=>{
    const d = LCPS_DATA[lcpsSubject][year][lcpsGrade];
    tH += `<div style="background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.04)">
      <div style="font-size:13px;font-weight:600;color:#777;margin-bottom:12px;text-align:center">${year}</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr>
          <th style="padding:6px 8px;background:#eee;font-size:11px;color:#888;border-bottom:1px solid #ddd;text-align:left"></th>
          <th style="padding:6px 8px;background:#eee;font-size:11px;color:#888;border-bottom:1px solid #ddd;text-align:center">SOY</th>
          <th style="padding:6px 8px;background:#eee;font-size:11px;color:#888;border-bottom:1px solid #ddd;text-align:center">EOY</th>
          <th style="padding:6px 8px;background:#eee;font-size:11px;color:#888;border-bottom:1px solid #ddd;text-align:center">Change</th>
        </tr></thead><tbody>`;
    LCPS_LABELS.forEach((lbl,i)=>{
      const delta=d.EOY[i]-d.SOY[i];
      const dTxt=delta===0?'-':delta>0?'\u25B2 +'+delta:'\u25BC '+delta;
      const dCol=delta>0&&i===0?'#0D6B50':delta<0&&i===0?'#C0392B':delta>0&&i===2?'#C0392B':delta<0&&i===2?'#0D6B50':'#6B4DAA';
      tH+=`<tr>
        <td style="padding:6px 8px;border-bottom:1px solid #eee;font-weight:600;display:flex;align-items:center;gap:6px">
          <span style="width:8px;height:8px;border-radius:50%;background:${LCPS_COLORS[i]};display:inline-block"></span>${lbl}
        </td>
        <td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:center">${d.SOY[i]}%</td>
        <td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:center">${d.EOY[i]}%</td>
        <td style="padding:6px 8px;border-bottom:1px solid #eee;text-align:center;font-weight:700;color:${dCol}">${dTxt}</td>
      </tr>`;
    });
    tH += '</tbody></table></div>';
  });
  tH += '</div>';
  document.getElementById('lcpsTable').innerHTML = tH;
}

/* ── RENDER & NAV ─────────────────────────────────────────────────────── */
let topTab = 'HYD'; // 'HYD' or 'LCPS'

function render(){
  updateNav();
  if(topTab==='LCPS'){renderLCPS();return;}
  renderVertical('HYD Govt - GP');
}

function buildNav(){
  const navEl=document.getElementById('mainNav');
  navEl.innerHTML='';

  // Top-level tabs
  const topBar=document.createElement('div');
  topBar.style.cssText='display:flex;justify-content:center;margin-bottom:20px;gap:0';

  [['HYD','HYD Govt - GP'],['LCPS','LCPS']].forEach(([key,label],i)=>{
    const btn=document.createElement('button');
    btn.textContent=label;
    const active=topTab===key;
    btn.style.cssText=`padding:12px 32px;font-size:14px;font-weight:700;border:2px solid #333;cursor:pointer;font-family:inherit;transition:all .15s;${i===0?'border-radius:10px 0 0 10px':'border-radius:0 10px 10px 0;border-left:none'};${active?'background:#333;color:#fff':'background:#fff;color:#555'}`;
    btn.addEventListener('click',()=>{
      topTab=key;
      if(key==='HYD'){currentView='SoyEoy';}
      buildNav();render();
    });
    topBar.appendChild(btn);
  });
  navEl.appendChild(topBar);

  // HYD sub-tabs
  if(topTab==='HYD'){
    const subBar=document.createElement('div');
    subBar.style.cssText='display:flex;justify-content:center;margin-bottom:20px;gap:0';
    navEl.appendChild(subBar);
  }
}

buildNav();currentView='HYD Govt - GP';hydAllGrades=true;render();
</script>
</body>
</html>
