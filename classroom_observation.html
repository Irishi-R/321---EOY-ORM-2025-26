/* ── INSIGHT GENERATORS ─────────────────────────────────────────────── */
function genSoyIns(data){
  const ins=[],ms=data.metrics;
  let bM=null,bD=-999,wM=null,wD=999;
  ms.forEach(m=>{const d=m.EOY[m.positive[0]]-m.SOY[m.positive[0]];if(d>bD){bD=d;bM=m;}if(d<wD){wD=d;wM=m;}});
  if(bM&&bD>1)ins.push({type:'positive',text:`<strong>${bM.name}</strong> improved the most — up <strong>+${bD.toFixed(1)}%</strong> from SOY to EOY.`});
  if(wM&&wD<-1)ins.push({type:'negative',text:`<strong>${wM.name}</strong> declined the most — dropped <strong>${wD.toFixed(1)}%</strong> from SOY to EOY.`});
  ms.forEach(m=>{
    const soy=m.SOY[m.positive[0]],eoy=m.EOY[m.positive[0]];
    if(soy<80&&eoy>=80)ins.push({type:'positive',text:`<strong>${m.name}</strong> crossed the <strong>80% threshold</strong> by EOY (${soy}% → ${eoy}%).`});
    else if(soy<50&&eoy>=50)ins.push({type:'positive',text:`<strong>${m.name}</strong> crossed the <strong>50% mark</strong> by EOY (${soy}% → ${eoy}%).`});
    else if(soy>=50&&eoy<50)ins.push({type:'negative',text:`<strong>${m.name}</strong> dropped below <strong>50%</strong> by EOY (${soy}% → ${eoy}%).`});
    if(eoy===100)ins.push({type:'positive',text:`<strong>${m.name}</strong> achieved a perfect <strong>100%</strong> positive response at EOY.`});
    else if(eoy<50)ins.push({type:'negative',text:`<strong>${m.name}</strong> remains below 50% at EOY (<strong>${eoy}%</strong>) — a priority area.`});
  });
  return ins.slice(0,5);
}

function genCmpSOYIns(m1,m2,name,v1,v2){
  const ins=[],e1=m1.EOY[0],e2=m2.EOY[0],d1=parseFloat((m1.EOY[0]-m1.SOY[0]).toFixed(1)),d2=parseFloat((m2.EOY[0]-m2.SOY[0]).toFixed(1));
  const gap=Math.abs(e1-e2).toFixed(1);
  if(gap>5){const ldr=e1>=e2?v1:v2;ins.push({type:'neutral',text:`<strong>${ldr}</strong> leads on <strong>${name}</strong> at EOY with <strong>${Math.max(e1,e2)}%</strong> — a ${gap}% gap.`});}
  if(d1>0&&d2<0)ins.push({type:'neutral',text:`<strong>${v1}</strong> improved while <strong>${v2}</strong> declined on <strong>${name}</strong>.`});
  else if(d2>0&&d1<0)ins.push({type:'neutral',text:`<strong>${v2}</strong> improved while <strong>${v1}</strong> declined on <strong>${name}</strong>.`});
  if(d1>10)ins.push({type:'positive',text:`<strong>${v1}</strong> made a strong <strong>+${d1}%</strong> improvement on ${name}.`});
  if(d2>10)ins.push({type:'positive',text:`<strong>${v2}</strong> made a strong <strong>+${d2}%</strong> improvement on ${name}.`});
  return ins;
}

function genOverallIns(data,vName){
  const ins=[],ms=data.metrics;
  let bM=null,bV=-1,wM=null,wV=999;
  ms.forEach(m=>{const v=m.vals[m.positive[0]];if(v>bV){bV=v;bM=m;}if(v<wV){wV=v;wM=m;}});
  if(bM)ins.push({type:'positive',text:`<strong>${bM.name}</strong> is the strongest metric at <strong>${bV}%</strong> positive response.`});
  if(wM&&wV<bV)ins.push({type:wV<50?'negative':'neutral',text:`<strong>${wM.name}</strong> is the weakest area at <strong>${wV}%</strong>${wV<50?' — below the 50% threshold.':'.'}` });
  ms.forEach(m=>{const v=m.vals[m.positive[0]];if(v<50)ins.push({type:'negative',text:`<strong>${m.name}</strong> at <strong>${v}%</strong> — more than half of observations not meeting this standard.`});});
  ms.forEach(m=>{const v=m.vals[m.positive[0]];if(v>=90)ins.push({type:'positive',text:`<strong>${m.name}</strong> is performing excellently at <strong>${v}%</strong>.`});});
  return ins.slice(0,5);
}

function genCmpOverallIns(){
  const ins=[],allV=Object.keys(OVERALL_DATA).filter(v=>showJamnagar||v!=='Jamnagar');
  COMMON_MAP.forEach(cm=>{
    const showV=allV.filter(v=>!cm.skipVerticals.includes(v)&&cm.map[v]);
    const vals=showV.map(v=>{const mD=OVERALL_DATA[v].metrics.find(m=>m.name===cm.map[v].metric);return{v,val:mD?mD.vals[0]:0};}).sort((a,b)=>b.val-a.val);
    const top=vals[0],bot=vals[vals.length-1],gap=(top.val-bot.val).toFixed(1);
    if(gap>15)ins.push({type:'neutral',text:`Large gap on <strong>${cm.label}</strong>: <strong>${top.v}</strong> leads at ${top.val}% vs <strong>${bot.v}</strong> at ${bot.val}% (${gap}% spread).`});
    if(top.val>=90)ins.push({type:'positive',text:`<strong>${top.v}</strong> tops <strong>${cm.label}</strong> at <strong>${top.val}%</strong> across all verticals.`});
    if(bot.val<50)ins.push({type:'negative',text:`<strong>${bot.v}</strong> is below 50% on <strong>${cm.label}</strong> (<strong>${bot.val}%</strong>) — a priority area.`});
  });
  return ins.slice(0,6);
}

          <div class="metric-card-title" style="font-size:15px;margin-bottom:2px">${metric}</div>
          <div style="font-size:10px;color:#bbb;display:flex;gap:14px;margin-top:4px">
            <span style="display:flex;align-items:center;gap:4px"><span style="width:24px;height:3px;background:#888;display:inline-block;border-radius:2px;opacity:.5"></span>2024–25</span>
            <span style="display:flex;align-items:center;gap:4px"><span style="width:24px;height:3px;background:#333;display:inline-block;border-radius:2px"></span>2025–26</span>
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(${verticals.length},1fr);gap:14px">`;

    verticals.forEach(v => {
      const d = YOY_DATA[v]?.[metric];
      if (!d) { h += `<div></div>`; return; }
      const col = V_COLORS[v];
      const pos24 = d['2024-25'][0];
      const pos25 = d['2025-26'][0];
      const diff = +(pos25 - pos24).toFixed(1);
      const diffCol = diff > 1 ? '#0D6B50' : diff < -1 ? '#C0392B' : '#888';
      const diffArrow = diff > 1 ? '▲' : diff < -1 ? '▼' : '—';

      h += `<div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:11px;font-weight:700;color:${col}">${v.replace('AMC - ','AMC ')}</div>
          <span style="font-size:10px;font-weight:700;color:${diffCol}">${diff !== 0 ? diffArrow + Math.abs(diff) + '%' : '—'}</span>
        </div>
        <div style="margin-bottom:8px">
          <div style="font-size:9px;color:#aaa;margin-bottom:3px;font-weight:600">2024–25</div>
          <div class="bar-track" style="height:22px;opacity:0.65">`;
      d['2024-25'].forEach((val, i) => {
        if (!val) return;
        const show = val >= 8;
        h += `<div class="bar-seg${show ? '' : ' tiny'}" style="width:${val}%;background:${SLOT_COLORS[i]||SLOT_COLORS[2]}" title="${d.options[i]}: ${val}%">${show ? val + '%' : ''}</div>`;
      });
      h += `</div></div>
        <div>
          <div style="font-size:9px;color:#aaa;margin-bottom:3px;font-weight:600">2025–26</div>
          <div class="bar-track" style="height:22px">`;
      d['2025-26'].forEach((val, i) => {
        if (!val) return;
        const show = val >= 8;
        h += `<div class="bar-seg${show ? '' : ' tiny'}" style="width:${val}%;background:${SLOT_COLORS[i]||SLOT_COLORS[2]}" title="${d.options[i]}: ${val}%">${show ? val + '%' : ''}</div>`;
      });
      h += `</div></div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">`;
      d.options.forEach((opt, i) => {
        h += `<div style="display:flex;align-items:center;gap:3px;font-size:9px;color:#888"><div style="width:7px;height:7px;border-radius:2px;background:${SLOT_COLORS[i]||SLOT_COLORS[2]}"></div>${opt}</div>`;
      });
      h += `</div></div>`;
    });
    h += `</div></div>`;
  });

  h += `</div>`;
  el.innerHTML = h;
}

/* ── TAB SWITCH ─────────────────────────────────────────────────────── */
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.main-tab').forEach((t,i)=>{
    t.classList.toggle('active',(i===0&&tab==='yoy')||(i===1&&tab==='soy-eoy')||(i===2&&tab==='overall'));
  });
  const btn=document.getElementById('jamnagarBtn');
  if(btn) btn.textContent=showJamnagar?'Hide Jamnagar ▲':'Show Jamnagar ▾';
  if(tab==='yoy')renderYoY();
  else if(tab==='soy-eoy')renderSoyEoy();
  else if(tab==='overall')renderOverall();
}

/* ── TAB 1 ──────────────────────────────────────────────────────────── */
function renderSoyEoy(){
  const el=document.getElementById('tab-content');
  let h='<div class="vertical-toggle">';
  Object.keys(OBS_DATA).filter(v=>showJamnagar||v!=='Jamnagar').forEach(v=>{h+=`<button class="vtab${v===currentSoyV?' active':''}" data-v="${v}" onclick="switchSoyV('${v}')">${v}</button>`;});
  h+=`<button class="vtab${currentSoyV==='compare'?' active':''}" data-v="compare" onclick="switchSoyV('compare')" style="border-left:none">Compare Common</button>`;
  h+='</div><div id="soy-area"></div>';
  el.innerHTML=h;
  paintSoy();
}

function switchSoyV(v){
  currentSoyV=v;
  document.querySelectorAll('#tab-content .vtab').forEach(b=>b.classList.toggle('active',b.dataset.v===v));
  paintSoy();
}

function paintSoy(){
  const el=document.getElementById('soy-area');
  if(currentSoyV==='compare'){paintSoyCmp(el);return;}
  const data=OBS_DATA[currentSoyV];
  let h='<div class="metrics-grid">';
  data.metrics.forEach(m=>{
    const posIdx=m.positive[0];
    const diff=parseFloat((m.EOY[posIdx]-m.SOY[posIdx]).toFixed(1));
    h+=`<div class="metric-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="metric-card-title">${m.name}</div>${badge(diff)}
      </div>`;
    h+=buildBar('SOY',m.SOY,m.options,m.naSlot);
    h+=buildBar('EOY',m.EOY,m.options,m.naSlot);
    h+='<div class="legend-row">';
    m.options.forEach((opt,i)=>{if(m.SOY[i]>0||m.EOY[i]>0)h+=`<div class="legend-item"><div class="legend-dot" style="background:${sc(m,i)}"></div>${opt}</div>`;});
    h+='</div></div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

function paintSoyCmp(el){
  const COMMON=[
    {name:'CFU',options:['Yes','No'],note:'Checking for understanding during class'},
    {name:'Practice Time',options:['Yes','Yes, but to some students','No'],note:'Students given dedicated practice time'},
    {name:'Students on Task',options:['More than 75%','50–75%','Less than 50%'],note:'Proportion of students actively engaged'}
  ];
  const V1='LCPS',V2='HYD Govt - GP';
  const getM=(v,name)=>OBS_DATA[v].metrics.find(m=>m.name===name);
  let h=`<div style="background:#fff;border:1px solid #E5E2DC;border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
    <div style="font-size:11px;font-weight:700;color:#aaa;letter-spacing:.6px;text-transform:uppercase">Legend</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#555"><div style="width:12px;height:12px;border-radius:3px;background:#2D9E6F"></div>Positive</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#555"><div style="width:12px;height:12px;border-radius:3px;background:#F0A843"></div>Partial</div>
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#555"><div style="width:12px;height:12px;border-radius:3px;background:#E05A5A"></div>Negative</div>
    </div>
    <div style="margin-left:auto;font-size:11px;color:#bbb">3 metrics in common</div>
  </div>`;
  COMMON.forEach(cm=>{
    const m1=getM(V1,cm.name),m2=getM(V2,cm.name);
    if(!m1||!m2)return;
    const d1=parseFloat((m1.EOY[0]-m1.SOY[0]).toFixed(1)),d2=parseFloat((m2.EOY[0]-m2.SOY[0]).toFixed(1));
    h+=`<div class="metric-card" style="margin-bottom:16px">
      <div style="margin-bottom:18px">
        <div class="metric-card-title" style="font-size:15px;margin-bottom:3px">${cm.name}</div>
        <div style="font-size:11px;color:#bbb">${cm.note}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-size:12px;font-weight:700;color:${V_COLORS[V1]}">${V1}</div>${badge(d1)}
          </div>
          ${buildBar('SOY',m1.SOY,cm.options,m1.naSlot)}${buildBar('EOY',m1.EOY,cm.options,m1.naSlot)}
        </div>
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-size:12px;font-weight:700;color:${V_COLORS[V2]}">${V2}</div>${badge(d2)}
          </div>
          ${buildBar('SOY',m2.SOY,cm.options,m2.naSlot)}${buildBar('EOY',m2.EOY,cm.options,m2.naSlot)}
        </div>
      </div>
      <div class="legend-row">`;
    cm.options.forEach((opt,i)=>{h+=`<div class="legend-item"><div class="legend-dot" style="background:${SLOT_COLORS[i]}"></div>${opt}</div>`;});
    const cIns=genCmpSOYIns(m1,m2,cm.name,V1,V2);
    if(cIns.length){h+='</div><div style="margin-top:12px;padding-top:12px;border-top:1px solid #f0f0ec">';cIns.forEach(i=>{h+=`<div class="insight-item ${i.type}" style="margin-bottom:4px">${i.text}</div>`;});}
    h+='</div></div>';
  });
  el.innerHTML=h;
}

/* ── TAB 2 ──────────────────────────────────────────────────────────── */
function renderOverall(){
  const el=document.getElementById('tab-content');
  let h='<div class="vertical-toggle" style="flex-wrap:wrap;gap:4px;margin-bottom:24px">';
  Object.keys(OVERALL_DATA).filter(v=>showJamnagar||v!=='Jamnagar').forEach(v=>{
    const col=V_COLORS[v]||'#333',active=v===currentOverallV;
    h+=`<button class="vtab${active?' active':''}" data-v="${v}" style="${active?`background:${col};border-color:${col};color:#fff`:''}" onclick="switchOverallV('${v}')">${v}</button>`;
  });
  const cmpA=currentOverallV==='compare';
  h+=`<button class="vtab${cmpA?' active':''}" data-v="compare" style="${cmpA?'background:#333;border-color:#333;color:#fff;border-left:none':'border-left:none'}" onclick="switchOverallV('compare')">Compare Common</button>`;
  h+='</div><div id="overall-area"></div>';
  el.innerHTML=h;
  paintOverall();
}

function switchOverallV(v){
  currentOverallV=v;
  document.querySelectorAll('#tab-content .vtab').forEach(b=>{
    const a=b.dataset.v===v,col=V_COLORS[b.dataset.v]||'#333';
    b.classList.toggle('active',a);
    b.style.background=a?col:'';b.style.borderColor=a?col:'';b.style.color=a?'#fff':'';
  });
  paintOverall();
}

function paintOverall(){
  const el=document.getElementById('overall-area');
  if(currentOverallV==='compare'){paintOverallCmp(el);return;}
  const data=OVERALL_DATA[currentOverallV],col=V_COLORS[currentOverallV]||'#333';
  let h='<div class="metrics-grid">';
  data.metrics.forEach(m=>{
    const posVal=m.vals[m.positive[0]];
    h+=`<div class="metric-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="metric-card-title">${m.name}</div>
        <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;background:${col}20;color:${col}">${posVal}%</span>
      </div>
      <div class="bar-row" style="margin-bottom:0"><div class="bar-track" style="height:32px">`;
    m.vals.forEach((v,i)=>{
      if(v===0)return;
      const show=v>=8;
      h+=`<div class="bar-seg${show?'':' tiny'}" style="width:${v}%;background:${sc(m,i)}" title="${m.options[i]}: ${v}%">${show?v+'%':''}</div>`;
    });
    h+=`</div></div><div class="legend-row">`;
    m.options.forEach((opt,i)=>{if(m.vals[i]>0)h+=`<div class="legend-item"><div class="legend-dot" style="background:${sc(m,i)}"></div>${opt}: <strong>${m.vals[i]}%</strong></div>`;});
    h+='</div></div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

function paintOverallCmp(el){
  const allV=Object.keys(OVERALL_DATA).filter(v=>showJamnagar||v!=='Jamnagar');
  let h='<div style="display:flex;flex-direction:column;gap:24px">';
  COMMON_MAP.forEach(cm=>{
    const showV=allV.filter(v=>!cm.skipVerticals.includes(v)&&cm.map[v]);
    h+=`<div class="metric-card">
      <div style="margin-bottom:18px">
        <div class="metric-card-title" style="font-size:15px;margin-bottom:2px">${cm.label}</div>
        <div style="font-size:11px;color:#bbb">${cm.note}</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(${showV.length},1fr);gap:16px">`;
    showV.forEach(v=>{
      const mD=OVERALL_DATA[v].metrics.find(m=>m.name===cm.map[v].metric);
      if(!mD)return;
      const col=V_COLORS[v],posVal=mD.vals[0];
      h+=`<div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="font-size:11px;font-weight:700;color:${col}">${v}</div>
          <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;background:${col}20;color:${col}">${posVal}%</span>
        </div>
        <div class="bar-track" style="height:28px;margin-bottom:6px">`;
      mD.vals.forEach((val,i)=>{
        if(val===0)return;
        const show=val>=8;
        h+=`<div class="bar-seg${show?'':' tiny'}" style="width:${val}%;background:${sc(mD,i)}" title="${mD.options[i]}: ${val}%">${show?val+'%':''}</div>`;
      });
      h+=`</div><div style="display:flex;flex-wrap:wrap;gap:5px">`;
      mD.options.forEach((opt,i)=>{if((mD.vals[i]||0)>0)h+=`<div style="display:flex;align-items:center;gap:3px;font-size:9px;color:#888"><div style="width:7px;height:7px;border-radius:2px;background:${sc(mD,i)}"></div>${opt}</div>`;});
      h+='</div></div>';
    });
    h+='</div></div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

/* ── INIT ───────────────────────────────────────────────────────────── */
renderYoY();
</script>
</body>
</html>
